const cards = [{"id": "fool", "name": "The Fool", "vietnameseName": "Kẻ Ngây Thơ", "number": "0", "arcana": "major", "suit": null, "keywords": "Khởi đầu mới, tự do, ngây thơ, tiềm năng", "upright": "Bạn đang ở ngưỡng cửa của một cuộc phiêu lưu mới. Đây là lúc tin tưởng bản thân, bước đi với tâm thế cởi mở và đón nhận những điều chưa biết. Đừng lo lắng quá nhiều về kế hoạch, cứ để mọi thứ diễn ra tự nhiên.", "reversed": "Cẩn thận với sự vội vàng hoặc thiếu suy nghĩ. Bạn có thể đang bỏ qua rủi ro, hoặc hành động như một đứa trẻ bốc đồng. Nên dừng lại, nhìn nhận thực tế trước khi nhảy việc gì.", "love": "Tình yêu mới đang đến, hoặc mối quan hệ hiện tại cần thêm chút bất ngờ và vui vẻ. Đừng gò bó nhau trong khuôn khổ. Nếu độc thân, hãy cứ yêu mà không cần toan tính.", "career": "Cơ hội nghề nghiệp mới đang mở ra. Có thể là dự án lạ, công việc ở nơi xa, hoặc ngành nghề bạn chưa từng nghĩ tới. Tài chính cần thận trọng — đừng đầu tư mù quáng.", "spirituality": "Hành trình tâm linh của bạn đang bắt đầu. Hãy tin vào trực giác, thử nghiệm các phương pháp mới như thiền đi dạo, viết nhật ký giấc mơ. Mọi thứ đều có thể là bài học."}, {"id": "magician", "name": "The Magician", "vietnameseName": "Nhà Ảo Thuật", "number": "I", "arcana": "major", "suit": null, "keywords": "Sáng tạo, kỹ năng, ý chí, biến ý tưởng thành hiện thực", "upright": "Bạn có đầy đủ công cụ và tài nguyên để thành công. Đây là lúc hành động — đừng chỉ nghĩ suông. Tập trung năng lượng, sử dụng khéo léo những gì bạn có để tạo ra kết quả.", "reversed": "Bạn đang lãng phí tài năng hoặc cảm thấy bất lực. Có thể do thiếu tự tin, hoặc đang dùng khả năng của mình vào việc không đáng. Hãy xem lại: bạn thực sự muốn gì?", "love": "Bạn có sức hút và biết cách làm chủ tình huống trong tình yêu. Nếu độc thân, hãy chủ động tạo cơ hội. Nếu đã có đôi, đây là lúc làm mới mối quan hệ bằng sự sáng tạo.", "career": "Thời điểm vàng để thuyết phục, đàm phán, hoặc khởi nghiệp. Bạn có khả năng gây ảnh hưởng lên người khác. Tài chính sáng suốt, có thể tìm thêm nguồn thu nhập.", "spirituality": "Bạn có năng lượng để biến đổi thực tại tinh thần. Hãy kết hợp các yếu tố: lửa (đam mê), nước (cảm xúc), gió (ý tưởng), đất (hành động) để tìm ra con đường riêng."}, {"id": "high-priestess", "name": "The High Priestess", "vietnameseName": "Nữ Tư Tế", "number": "II", "arcana": "major", "suit": null, "keywords": "Trực giác, bí ẩn, tiềm thức, sự khôn ngoan bên trong", "upright": "Hãy lắng nghe tiếng nói bên trong thay vì logic bề ngoài. Câu trả lời đã nằm trong bạn. Đây là thời điểm thích hợp để quan sát, nghiên cứu, hoặc chờ đợi thay vì hành động ngay.", "reversed": "Bạn đang bỏ qua trực giác hoặc bị cuốn theo bề mặt sự việc. Có thể bạn đang giữ quá nhiều bí mật, hoặc bị lừa dối bởi vẻ ngoài. Hãy tìm sự thật sâu hơn.", "love": "Tình yêu cần sự tin tưởng sâu sắc. Đừng ép buộc đối phương phải nói ra tất cả. Một mối quan hệ kín đáo, tôn trọng không gian riêng sẽ bền vững hơn.", "career": "Công việc đòi hỏi sự tĩnh lặng và phân tích. Hãy đọc kỹ hợp đồng, tìm hiểu ngầm trước khi quyết định. Tài chính ổn định, nên giữ tiền dự phòng.", "spirituality": "Kết nối với nữ tính bên trong (bất kể giới tính). Thiền, chiêm tinh, hoặc giấc mơ đang mang thông điệp quan trọng. Ghi chép lại những linh cảm — chúng rất chính xác lúc này."}, {"id": "empress", "name": "The Empress", "vietnameseName": "Nữ Hoàng", "number": "III", "arcana": "major", "suit": null, "keywords": "Sự phồn thịnh, sáng tạo, mẫu tính, thiên nhiên, đầy đủ", "upright": "Một giai đoạn phát triển, thịnh vượng và dồi dào đang đến. Dù là dự án sáng tạo, mối quan hệ, hay sức khỏe — mọi thứ đều nở hoa. Hãy nuôi dưỡng bản thân và người thân.", "reversed": "Bạn có thể đang quá phụ thuộc, lười biếng, hoặc cảm thấy trống rỗng. Thiếu cảm hứng, hoặc mối quan hệ trở nên nặng nề. Cần tìm lại niềm vui sống và sự độc lập.", "love": "Tình yêu đang nở rộ, ấm áp và nuôi dưỡng. Có thể mang thai hoặc chuẩn bị đón con. Nếu độc thân, hãy yêu thương bản thân trước — sự tự tin sẽ thu hút đúng người.", "career": "Công việc sáng tạo, làm đẹp, nông nghiệp, hoặc chăm sóc đang thăng hoa. Tài chính dư dả từ những dự án dài hạn. Hãy đầu tư vào bản thân.", "spirituality": "Hãy ra ngoài, tiếp xúc với thiên nhiên. Trồng cây, đi bộ barefoot trên cỏ, hoặc tắm nắng. Năng lượng mẫu thể đang bao quanh bạn — hãy đón nhận sự chữa lành."}, {"id": "emperor", "name": "The Emperor", "vietnameseName": "Hoàng Đế", "number": "IV", "arcana": "major", "suit": null, "keywords": "Quyền lực, cấu trúc, kỷ luật, cha/bảo vệ, ổn định", "upright": "Bạn cần tổ chức lại cuộc sống bằng kỷ luật và kế hoạch rõ ràng. Đây là lúc đứng lên làm chủ, đưa ra quyết định vững chắc. Hãy xây dựng nền móng vững chắc cho tương lai.", "reversed": "Bạn đang quá cứng nhắc, độc đoán, hoặc kiểm soát người khác quá mức. Có thể bị thẩm quyền đè nén, hoặc bản thân trở thành kẻ bóp nghẹt tự do. Cần mềm mỏng hơn.", "love": "Mối quan hệ cần sự cam kết và ranh giới rõ ràng. Hãy bảo vệ người thân nhưng đừng kiểm soát. Nếu độc thân, bạn có thể hút người có tính cha/bảo vệ, hoặc cần tự mình vững vàng hơn.", "career": "Thăng tiến qua kỷ luật và năng lực lãnh đạo. Cấp trên đánh giá cao sự đáng tin cậy. Tài chính cần ngân sách, kế hoạch dài hạn — tránh chi tiêu bốc đồng.", "spirituality": "Tìm kiếm một hệ thống tâm linh có cấu trúc, hoặc một người thầy vững chắc. Kỷ luật thiền định mỗi ngày sẽ mang lại sự bình an và trật tự nội tâm."}, {"id": "hierophant", "name": "The Hierophant", "vietnameseName": "Giáo Hoàng", "number": "V", "arcana": "major", "suit": null, "keywords": "Truyền thống, niềm tin, giáo dục, hướng dẫn, đạo đức", "upright": "Bạn đang cần lời khuyên từ người có kinh nghiệm, hoặc quay về các giá trị truyền thống. Đây là lúc học hỏi từ quá khứ, tôn trọng quy tắc, hoặc theo đuổi việc học nâng cao.", "reversed": "Bạn cảm thấy bị gò bó bởi quy tắc, tôn giáo, hoặc kỳ vọng xã hội. Có thể bạn đang sống theo khuôn mẫu người khác đặt ra. Hãy dám phá vỡ và tìm con đường riêng.", "love": "Mối quan hệ truyền thống, được gia đình ủng hộ, hoặc có thể tiến tới hôn nhân. Nếu đang gặp rắc rối, hãy tìm cố vấn viên mối quan hệ hoặc người đáng tin cậy.", "career": "Môi trường làm việc cần tuân thủ quy trình. Bạn có thể học thêm chứng chỉ, tìm mentor. Tài chính an toàn nhưng chậm — hãy kiên nhẫn.", "spirituality": "Quay về với niềm tin gốc rễ, hoặc tìm một cộng đồng tâm linh để thuộc về. Nghi lễ, truyền thống có thể mang lại sự kết nối sâu sắc mà bạn đang thiếu."}, {"id": "lovers", "name": "The Lovers", "vietnameseName": "Đôi Tình Nhân", "number": "VI", "arcana": "major", "suit": null, "keywords": "Tình yêu, hài hòa, lựa chọn, giá trị, kết nối", "upright": "Một mối quan hệ ý nghĩa đang phát triển, hoặc bạn cần đưa ra quyết định quan trọng dựa trên giá trị cốt lõi. Hãy chọn con đường trung thực với bản thân, dù khó khăn.", "reversed": "Mất cân bằng trong mối quan hệ, lựa chọn sai, hoặc xung đột giá trị. Có thể bạn đang bị cám dỗ nhưng không phải thứ tốt cho mình. Cần nhìn lại đâu là ưu tiên thật sự.", "love": "Tình yêu đích thực, sự gắn kết sâu sắc. Nếu độc thân, bạn sắp gặp người có cùng giá trị. Nếu đã có đôi, đây là lúc thảo luận thẳng thắn về tương lai.", "career": "Cần quyết định giữa hai con đường sự nghiệp. Hãy chọn cái phù hợp với đạo đức và lòng mình, không phải cái trả lương cao hơn. Hợp tác kinh doanh tốt.", "spirituality": "Tìm sự hài hòa giữa các mặt của bản thân. Tâm linh không phải chọn giữa thể xác và tinh thần — hãy kết hợp cả hai. Thiền về sự cân bằng nam-nữ bên trong."}, {"id": "chariot", "name": "The Chariot", "vietnameseName": "Chiến Xa", "number": "VII", "arcana": "major", "suit": null, "keywords": "Quyết tâm, chiến thắng, kiểm soát, hành động, tiến lên", "upright": "Bạn có đủ ý chí và năng lượng để vượt qua mọi chướng ngại. Đây là lúc tập trung mục tiêu, điều khiển cảm xúc tiêu cực, lao về phía trước. Chiến thắng đang chờ.", "reversed": "Mất kiểm soát, cảm xúc hỗn loạn, hoặc quá hung hăng. Bạn có thể đang thắng trận nhưng thua cuộc chiến. Cần dừng lại, điều chỉnh trước khi lao đầu vào xung đột.", "love": "Tình yêu cần sự quyết tâm theo đuổi. Nếu độc thân, hãy chủ động rõ ràng. Nếu đã có đôi, cùng nhau vượt qua khó khăn — đừng để ngoại cảnh chia rẽ.", "career": "Thăng tiến nhanh qua nỗ lực và cạnh tranh. Bạn có khả năng dẫn dắt dự án khó. Tài chính tăng nếu bạn kiểm soát được chi tiêu và tập trung vào mục tiêu rõ ràng.", "spirituality": "Hai năng lượng đối lập trong bạn cần được điều khiển cùng nhau. Hãy dùng ý chí để hướng dẫn cảm xúc và lý trí về cùng một mục tiêu. Thiền đi bộ giúp tập trung."}, {"id": "strength", "name": "Strength", "vietnameseName": "Sức Mạnh", "number": "VIII", "arcana": "major", "suit": null, "keywords": "Can đảm, kiên nhẫn, khéo léo, nội lực, từ tốn", "upright": "Sức mạnh thật sự không đến từ bạo lực mà từ sự bình tĩnh. Bạn đang âm thầm vượt qua thử thách bằng lòng kiên nhẫn và sự khôn ngoan. Hãy tiếp tục nhẹ nhàng nhưng vững chắc.", "reversed": "Bạn đang nghi ngờ bản thân, cảm thấy yếu đuối, hoặc mất kiểm soát cảm xúc. Có thể đang chống lại bản năng thay vì điều phối nó. Hãy tìm lại sự tự tin từ bên trong.", "love": "Tình yêu cần sự kiên nhẫn và tha thứ. Đừng cố ép buộc đối phương thay đổi. Sự nhẹ nhàng, tin tưởng sẽ làm tan chảy mọi rào cản. Tình cảm bền vững từ từ xây dựng.", "career": "Xử lý khủng hoảng tại chỗ làm bằng sự điềm tĩnh. Cấp trên tin tưởng khả năng giữ vững của bạn. Tài chính cần kiên nhẫn — tránh quyết định vội vàng.", "spirituality": "Luyện tập 'lòng từ bi kiên định' — yêu thương mà không chiều theo cảm xúc tiêu cực. Đối mặt với nỗi sợ bằng sự hiểu biết, không phải chống cự."}, {"id": "hermit", "name": "The Hermit", "vietnameseName": "Ẩn Sĩ", "number": "IX", "arcana": "major", "suit": null, "keywords": "Tìm kiếm, cô độc, ánh sáng nội tâm, tự phản chiếu, hướng dẫn", "upright": "Bạn cần thời gian một mình để tìm câu trả lời. Đừng sợ cô đơn — đó là nơi trí tuệ sinh ra. Hãy rút lui khỏi ồn ào, chiếu sáng bên trong để thấy con đường đúng.", "reversed": "Cô lập quá mức, trầm cảm, hoặc lẩn trốn thực tại. Bạn có thể đang tránh người thân vì sợ bị tổn thương. Cần cân bằng giữa ở một mình và kết nối.", "love": "Tình yêu cần khoảng lặng. Nếu vừa chia tay, đây là lúc chữa lành. Nếu trong quan hệ, cả hai nên dành thời gian riêng để suy ngẫm. Tình yêu sâu sắc không cần liên tục ở bên nhau.", "career": "Tạm dừng sự nghiệp để học hỏi, nghiên cứu chuyên sâu, hoặc viết lộ trình mới. Công việc hiện tại có thể khiến bạn kiệt sức. Tài chính vẫn ổn nếu chi tiêu tiết kiệm.", "spirituality": "Hành trình tâm linh cá nhân, không cần tổ chức hay người hướng dẫn. Hãy đọc sách, thiền một mình trong bóng tối. Câu trả lời sẽ đến khi bạn đủ tĩnh lặng."}, {"id": "wheel-of-fortune", "name": "Wheel of Fortune", "vietnameseName": "Bánh Xe Vận Mệnh", "number": "X", "arcana": "major", "suit": null, "keywords": "Vận may, chu kỳ, thay đổi, cơ hội, định mệnh", "upright": "Cuộc sống đang chuyển động theo chiều hướng tích cực. Cơ hội bất ngờ sắp đến. Hãy nắm bắt, đừng bám víu vào quá khứ. Mọi thứ đều thay đổi — đó là luật tự nhiên.", "reversed": "Vận xui, sự cố ngoài ý muốn, hoặc cảm giác bị cuốn theo dòng đời. Có thể mất kiểm soát kết quả. Hãy chấp nhận những gì không thay đổi được và tìm cách thích ứng.", "love": "Tình yêu có thể đến từ nơi không ngờ. Nếu đang khó khăn, mọi thứ sẽ chuyển biến. Đừng cố điều khiển tình yêu — hãy để nó tự nhiên diễn ra.", "career": "Thăng chức, thay đổi công việc, hoặc dự án bất ngờ thành công. Tài chính có biến động — có thể lên hoặc xuống đột ngột. Hãy có kế hoạch dự phòng.", "spirituality": "Hiểu rằng mọi thăng trầm đều có mục đích. Hãy buông bỏ cái tôi kiểm soát, tin tưởng vào vũ trụ. Thiền về sự vô thường để tìm bình an."}, {"id": "justice", "name": "Justice", "vietnameseName": "Công Lý", "number": "XI", "arcana": "major", "suit": null, "keywords": "Công bằng, chân lý, trách nhiệm, nhân quả, cân bằng", "upright": "Mọi việc sẽ được giải quyết công bằng. Hành động đúng đắn của bạn trong quá khứ sẽ được đền đáp. Đây là lúc đưa ra quyết định khách quan, dựa trên sự thật.", "reversed": "Bất công, gian lận, hoặc tránh né trách nhiệm. Có thể bạn đang bị vu oan, hoặc tự mình không trung thực. Hãy đối mặt với hậu quả và sửa chữa sai lầm.", "love": "Mối quan hệ cần sự trung thực tuyệt đối. Nếu có vấn đề, hãy nói ra sự thật. Tình yêu bền vững được xây trên niềm tin, không phải sự che giấu.", "career": "Hợp đồng, kiện tụng, hoặc pháp lý sẽ kết thúc có lợi nếu bạn đứng về phía đúng. Tài chính cần sự cân bằng — chi tiêu và tiết kiệm phải đi đôi với nhau.", "spirituality": "Hành động của bạn tạo ra sóng truyền — hãy chắc rằng bạn đang gieo điều tốt. Thiền về sự cân bằng giữa cho và nhận, giữa quyền lợi và trách nhiệm."}, {"id": "hanged-man", "name": "The Hanged Man", "vietnameseName": "Người Treo Ngược", "number": "XII", "arcana": "major", "suit": null, "keywords": "Tạm dừng, buông bỏ, nhìn nhận mới, hy sinh, chờ đợi", "upright": "Bạn cần dừng lại và nhìn mọi thứ từ góc độ khác. Đôi khi tiến lên không phải là câu trả lời — hãy tạm chấp nhận bị 'treo' để hiểu sâu hơn. Sự chờ đợi là cần thiết.", "reversed": "Bám víu, chống đổi, hoặc sợ thay đổi. Bạn đang lãng phí thời gian vì không chịu buông bỏ. Hãy chấp nhận mất mát để được tự do.", "love": "Tình yêu cần sự hy sinh nhỏ và nhìn nhận từ góc độ đối phương. Nếu đang bế tắc, hãy tạm dừng tranh cãi. Đôi khi im lặng và quan sát sẽ cứu vãn mọi thứ.", "career": "Công việc đình trệ, dự án bị hoãn. Đừng cố ép tiến độ — hãy dùng thời gian này để xem xét lại chiến lược. Tài chính cần kiên nhẫn, tránh rút vốn gấp.", "spirituality": "Buông bỏ cái tôi để tìm thấy sự giác ngộ. Thiền treo ngược (nếu an toàn) hoặc đơn giản là nằm im, thư giãn hoàn toàn. Sự chấp nhận mang lại bình an lớn hơn chiến đấu."}, {"id": "death", "name": "Death", "vietnameseName": "Tử Thần", "number": "XIII", "arcana": "major", "suit": null, "keywords": "Kết thúc, chuyển đổi, tái sinh, buông bỏ, biến đổi", "upright": "Một giai đoạn đang khép lại để mở ra giai đoạn mới tốt hơn. Đây không phải là cái chết vật lý mà là sự biến đổi sâu sắc. Hãy để cái cũ ra đi, đón nhận cái mới.", "reversed": "Kháng cự thay đổi, bám víu quá khứ, hoặc sợ hãi kết thúc. Bạn đang cản trở sự tái sinh của chính mình. Hãy tin rằng sau khi rời khỏi vùng an toàn, bạn sẽ lớn hơn.", "love": "Mối quan hệ cũ cần kết thúc để bạn tìm thấy tình yêu xứng đáng. Nếu đang khó khăn, hãy xem đây là cơ hội làm lại. Đừng sợ chia tay nếu nó không còn nuôi dưỡng bạn.", "career": "Thay đổi công việc lớn, nghỉ việc cũ, hoặc chuyển sang lĩnh vực hoàn toàn mới. Tài chính có thể giảm tạm thời nhưng sẽ phục hồi mạnh mẽ. Cắt giảm những khoản không cần thiết.", "spirituality": "Buông bỏ những niềm tin cũ không còn phục vụ bạn. Biến đổi tinh thần đang diễn ra — hãy để nó xảy ra. Tái sinh như phượng hoàng từ tro tàn là có thật."}, {"id": "temperance", "name": "Temperance", "vietnameseName": "Tiết Chế", "number": "XIV", "arcana": "major", "suit": null, "keywords": "Cân bằng, hòa hợp, kiên nhẫn, điều độ, hợp nhất", "upright": "Hãy tìm sự cân bằng giữa các khía cạnh cuộc sống. Đừng thiên lệch quá mức vào công việc hoặc tình cảm. Sự điều độ, nhẫn nại sẽ tạo ra kết quả lâu dài và bền vững.", "reversed": "Mất cân bằng, thái quá, hoặc nghiện ngập. Bạn đang dùng một thứ để lấp đầy khoảng trống khác. Cần điều chỉnh lối sống ngay trước khi mọi thứ đổ vỡ.", "love": "Tình yêu cần sự nhẫn nại và thấu hiểu. Đừng vội đòi hỏi. Cả hai hãy cùng nhau xây dựng từng bước nhỏ. Mối quan hệ hài hòa đến từ việc điều chỉnh cả hai phía.", "career": "Làm việc nhóm, hợp tác đa phương đang suôn sẻ. Hãy kết hợp nhiều kỹ năng để tạo sản phẩm độc đáo. Tài chính ổn định nhờ quản lý cân bằng thu chi.", "spirituality": "Luyện tập sự hòa hợp giữa thể chất và tinh thần. Thiền, yoga, hoặc bất kỳ hình thức nào giúp bạn cảm thấy 'trung tâm' đều tốt. Hãy trung hòa năng lượng tiêu cực."}, {"id": "devil", "name": "The Devil", "vietnameseName": "Ác Quỷ", "number": "XV", "arcana": "major", "suit": null, "keywords": "Ràng buộc, cám dỗ, vật chất, nghiện ngập, bóng tối bên trong", "upright": "Bạn đang bị trói buộc bởi thói quen, người nào đó, hoặc niềm tin hạn chế. Những sợi xích này do chính bạn tạo ra. Hãy nhận ra rằng bạn có quyền tự do — chỉ cần chọn.", "reversed": "Giải thoát, nhận thức, vượt qua nghiện ngập. Bạn đang thoát khỏi mối quan hệ độc hại hoặc thói quen xấu. Hãy tận dụng năng lượng này để giải phóng bản thân hoàn toàn.", "love": "Cảnh báo về mối quan hệ độc hại, lệ thuộc, hoặc cám dỗ vật chất. Nếu độc thân, tránh những người chỉ muốn lợi dụng. Nếu đã có đôi, xem lại sự ghen tuông hoặc kiểm soát.", "career": "Công việc đang vắt kiệt bạn, hoặc bạn làm việc chỉ vì tiền. Hãy xem lại giá trị cốt lõi. Tài chính có thể tốt nhưng đánh đổi bằng sức khỏe tinh thần — không đáng.", "spirituality": "Đối mặt với bóng tối bên trong mà không sợ hãi. Những gì bạn ghét ở người khác thường là phần bạn từ chối ở chính mình. Hãy ôm lấy toàn bộ con người bạn."}, {"id": "tower", "name": "The Tower", "vietnameseName": "Tháp Đổ", "number": "XVI", "arcana": "major", "suit": null, "keywords": "Phá vỡ đột ngột, chấn động, giải phóng, sự thật, sụp đổ", "upright": "Một sự thật đột ngột hoặc biến cố lớn đang phá vỡ nền móng cũ. Tuy đau đớn, đây là cần thiết để xây lại trên nền vững chắc hơn. Hãy để mọi thứ sụp đổ — bạn sẽ thoát ra tự do.", "reversed": "Bạn đang cố gắng giữ một 'tháp' sắp đổ. Sự kháng cự chỉ khiến đau đớn kéo dài. Hãy chấp nhận sụp đổ là bắt buộc và tìm cách hồi phục nhanh nhất.", "love": "Mối quan hệ có thể kết thúc đột ngột, hoặc một sự thật gây sốc được phơi bày. Nếu còn lại sau bão, nền tảng sẽ vững hơn. Nếu không, hãy xem đó là giải thoát.", "career": "Thay đổi công việc đột ngột, sa thải, hoặc công ty tái cơ cấu. Tài chính bị ảnh hưởng nghiêm trọng trong ngắn hạn. Hãy dựa vào tiền dự phòng và không hoảng loạn.", "spirituality": "Những niềm tin cũ đang sụp đổ — đó là dấu hiệu tiến hóa tinh thần. Đau nhưng cần thiết. Hãy để hệ thống giá trị mới tự nhiên hình thành từ đống đổ nát."}, {"id": "star", "name": "The Star", "vietnameseName": "Ngôi Sao", "number": "XVII", "arcana": "major", "suit": null, "keywords": "Hy vọng, cảm hứng, chữa lành, ánh sáng, tái sinh", "upright": "Sau cơn bão, bầu trời trong xanh và những ngôi sao xuất hiện. Bạn đang được chữa lành và truyền cảm hứng. Hãy mở lòng, tin tưởng vào tương lai tươi sáng. Mọi ước mơ đều có thể.", "reversed": "Mất hy vọng, cảm thấy lạc lõng, hoặc không tin vào bản thân. Bạn đang nhìn vào vết thương mà quên mất ánh sáng. Hãy tìm lại niềm tin từ những điều nhỏ bé.", "love": "Tình yêu mang lại hy vọng và chữa lành. Nếu độc thân, hãy tin rằng người phù hợp đang đến. Nếu đã có đôi, hãy cùng nhau xây dựng ước mơ chung — tình yêu là ngôi sao dẫn đường.", "career": "Sáng tạo đỉnh cao, dự án được công nhận. Hãy theo đuổi ước mơ táo bạo. Tài chính ổn định và có dấu hiệu tăng — đầu tư vào đam mê đang mang lại lợi nhuận.", "spirituality": "Bạn là ngôi sao dẫn đường cho người khác. Hãy chia sẻ câu chuyện chữa lành của mình. Kết nối với vũ trụ qua việc tắm sao, thiền dưới trời đêm, hoặc viết nhật ký ước mơ."}, {"id": "moon", "name": "The Moon", "vietnameseName": "Mặt Trăng", "number": "XVIII", "arcana": "major", "suit": null, "keywords": "Ảo ảnh, sợ hãi, tiềm thức, bí ẩn, trực giác", "upright": "Mọi thứ không như vẻ ngoài. Hãy tin vào trực giác hơn là những gì mắt thấy. Cảm xúc sâu thẳm, giấc mơ, và nỗi sợ đang cố gắng nói với bạn điều gì đó. Hãy lắng nghe.", "reversed": "Nỗi sợ hãi, lo âu, hoặc bị lừa dối đang kiểm soát bạn. Bạn có thể đang tưởng tượng ra kẻ thù không có thật. Hãy soi sáng bóng tối bằng sự thật và can đảm.", "love": "Tình yêu có thể chứa đựng bí mật, hoặc bạn đang yêu trong mơ mộng hơn là thực tế. Hãy nhìn rõ đối phương trước khi đầu tư cảm xúc. Nếu đã có đôi, hãy nói về nỗi sợ.", "career": "Môi trường làm việc không rõ ràng, có thể có chính trị nội bộ hoặc thông tin sai lệch. Tài chính cần thận trọng — đừng tin vào lời hứa hão. Kiểm tra kỹ hợp đồng.", "spirituality": "Đây là thời điểm sức mạnh tâm linh cao nhưng cũng dễ bị ảo giác nhất. Ghi chép giấc mơ, tin tưởng trực giác nhưng đừng để nỗi sợ lấn át. Thiền dưới ánh trăng."}, {"id": "sun", "name": "The Sun", "vietnameseName": "Mặt Trời", "number": "XIX", "arcana": "major", "suit": null, "keywords": "Vui vẻ, thành công, năng lượng, sự thật, sáng suốt", "upright": "Mọi thứ đều rõ ràng, tươi sáng và tràn đầy năng lượng. Bạn đang ở đỉnh cao. Hãy tận hưởng niềm vui, chia sẻ hạnh phúc với người khác. Thành công đến tự nhiên.", "reversed": "Quá tự tin, kiêu ngạo, hoặc che giấu sự thật dưới vẻ ngoài hào nhoáng. Bạn có thể đang ép mình vui vẻ trong khi bên trong khác. Hãy để cảm xúc thật ra ngoài.", "love": "Tình yêu vui vẻ, chân thành, ấm áp. Nếu độc thân, hạnh phúc đến từ việc yêu bản thân trước. Nếu đã có đôi, hãy cùng nhau làm những việc nhỏ vui vẻ — đó là chất keo.", "career": "Thăng tiến rõ ràng, được công nhận công khai. Dự án thành công vang dội. Tài chính tăng mạnh — hãy tận dụng để đầu tư lâu dài.", "spirituality": "Tinh thần sáng suốt, kết nối trực tiếp với nguồn sáng. Hãy tắm nắng, làm việc thiện, sống với trái tim cởi mở. Trẻ em và động vật nhỏ có thể mang thông điệp tinh thần cho bạn."}, {"id": "judgement", "name": "Judgement", "vietnameseName": "Phán Xét", "number": "XX", "arcana": "major", "suit": null, "keywords": "Giác ngộ, sống lại, kêu gọi, tha thứ, đánh giá", "upright": "Bạn đang được 'gọi' để thức tỉnh và sống đúng với mục đích thật sự. Đây là lúc đánh giá quá khứ, học hỏi, và bước vào giai đoạn mới với sự tha thứ cho bản thân và người khác.", "reversed": "Tự trách, mắc kẹt trong quá khứ, hoặc từ chối lời gọi thức tỉnh. Bạn có thể đang quá khắt khe với bản thân. Hãy tha thứ để được giải thoát.", "love": "Mối quan hệ cũ có thể hồi sinh dưới dạng mới, hoặc bạn nhận ra điều quan trọng về tình yêu. Nếu độc thân, hãy buông bỏ tiêu chuẩn quá cao để thấy người phù hợp.", "career": "Thăng tiến sau thời gian dài tích lũy. Có thể được mời vào vị trí lãnh đạo. Tài chính hồi phục từ quyết định sáng suốt trong quá khứ. Hãy đánh giá lại danh mục đầu tư.", "spirituality": "Thức tỉnh tinh thần — bạn không còn là người cũ. Hãy đón nhận 'lời gọi' từ vũ trụ, dù nó khiến bạn sợ. Tha thứ là chìa khóa giải phóng năng lượng tâm linh."}, {"id": "world", "name": "The World", "vietnameseName": "Thế Giới", "number": "XXI", "arcana": "major", "suit": null, "keywords": "Hoàn thành, tích hợp, toàn vẹn, du lịch, thành tựu", "upright": "Một chu kỳ lớn đã hoàn thành tuyệt đẹp. Bạn đã tích hợp mọi bài học và đạt được sự toàn vẹn. Đây là lúc ăn mừng, lên kế hoạch cho cuộc phiêu lưu mới. Bạn đã sẵn sàng.", "reversed": "Gần đích nhưng chưa hoàn thành, hoặc cảm thấy trống rỗng dù đạt được mục tiêu. Có thể bạn bỏ dở việc quan trọng. Hãy kiên trì thêm chút nữa để đóng vòng tròn.", "love": "Mối quan hệ đạt được sự trọn vẹn, cả hai cùng trưởng thành. Nếu độc thân, bạn đã đủ trọn vẹn để đón nhận tình yêu đích thực — không cần người khác để 'làm đầy'.", "career": "Dự án lớn hoàn thành, được công nhận rộng rãi. Có cơ hội làm việc quốc tế hoặc du lịch công tác. Tài chính viên mãn — đã đến lúc hưởng thành quả.", "spirituality": "Bạn đã tích hợp tất cả khía cạnh tâm linh và đạt sự toàn vẹn. Hãy vui mừng và bắt đầu chu kỳ mới ở cấp độ cao hơn. Vũ trụ đang vỗ tay cho bạn."}, {"id": "wands-ace", "name": "Ace of Wands", "vietnameseName": "Át Gậy", "number": "Ace", "arcana": "minor", "suit": "wands", "keywords": "Cảm hứng mới, sáng tạo, tiềm năng, bắt đầu nhiệt huyết", "upright": "Một cơ hội sáng tạo tuyệt vời đang xuất hiện. Hãy nắm bắt ngọn lửa này và biến thành hành động. Đây là khởi đầu của dự án, mối quan hệ, hoặc ý tưởng đầy năng lượng.", "reversed": "Cơ hội vuột mất, thiếu động lực, hoặc trì hoãn. Có thể bạn đang cảm thấy tắc nghẽn sáng tạo. Hãy tìm lại nguồn cảm hứng từ thiên nhiên hoặc vận động.", "love": "Tình yêu mới đầy nhiệt huyết và hấp dẫn. Nếu độc thân, hãy chủ động tạo cơ hội. Nếu đã có đôi, hãy thử điều mới mẻ cùng nhau để thắp lại lửa.", "career": "Ý tưởng kinh doanh mới, dự án sáng tạo, hoặc cơ hội thăng tiến. Hãy hành động nhanh. Tài chính có dấu hiệu tăng từ đầu tư mới.", "spirituality": "Năng lượng sáng tạo tâm linh đang dâng trào. Hãy sử dụng nó để viết, vẽ, hoặc sáng tạo nghi lễ riêng. Nguyên tố lửa dẫn dắt bạn đến giác ngộ."}, {"id": "wands-2", "name": "Two of Wands", "vietnameseName": "Hai Gậy", "number": "2", "arcana": "minor", "suit": "wands", "keywords": "Lập kế hoạch, quyết định, khám phá, tầm nhìn, chờ đợi", "upright": "Bạn đang đứng giữa lựa chọn và cần nhìn xa hơn. Hãy lập kế hoạch dài hạn, đánh giá rủi ro, và sẵn sàng bước ra khỏi vùng an toàn. Thế giới rộng lớn đang chờ.", "reversed": "Sợ rủi ro, do dự, hoặc bám víu vào những gì quen thuộc. Bạn có thể đang bỏ lỡ cơ hội vì thiếu can đảm. Hãy tin vào khả năng của mình.", "love": "Tình yêu cần quyết định rõ ràng. Nếu độc thân, có thể chọn giữa hai người hoặc giữa tình yêu và tự do. Nếu đã có đôi, hãy cùng lập kế hoạch tương lai.", "career": "Đánh giá cơ hội mở rộng kinh doanh hoặc chuyển công ty. Hãy nghiên cứu thị trường kỹ. Tài chính cần kiên nhẫn — đừng đầu tư vội.", "spirituality": "Mở rộng tầm nhìn tâm linh — học từ các truyền thống khác, đi hành hương. Sự hiểu biết rộng sẽ làm sâu sắc niềm tin của bạn."}, {"id": "wands-3", "name": "Three of Wands", "vietnameseName": "Ba Gậy", "number": "3", "arcana": "minor", "suit": "wands", "keywords": "Mở rộng, tiền đồ, hợp tác, kiên nhẫn, tầm nhìn xa", "upright": "Những gì bạn gieo trước đây đang bắt đầu kết trái. Hãy kiên nhẫn chờ đợi thuyền đến. Hợp tác quốc tế hoặc mở rộng thị trường đang có triển vọng tốt.", "reversed": "Thiếu kiên nhẫn, hợp tác thất bại, hoặc kế hoạch không đi đúng hướng. Có thể bạn đang trông đợi quá nhiều từ người khác. Hãy xem lại chiến lược.", "love": "Tình yêu phát triển qua thời gian và khoảng cách. Nếu độc thân, người phù hợp có thể ở xa. Nếu đã có đôi, hãy tin tưởng vào tương lai chung.", "career": "Dự án mở rộng thành công, đối tác tin cậy. Tài chính tăng từ nguồn thu mới hoặc thị trường mới. Hãy tiếp tục kiên nhẫn.", "spirituality": "Tâm linh đang mở rộng — bạn nhìn thấy kết nối giữa mình và vũ trụ rõ hơn. Hãy tiếp tục thực hành đều đặn, kết quả sẽ đến."}, {"id": "wands-4", "name": "Four of Wands", "vietnameseName": "Bốn Gậy", "number": "4", "arcana": "minor", "suit": "wands", "keywords": "Lễ kỷ niệm, hạnh phúc, gia đình, cộng đồng, thành tựu", "upright": "Một sự kiện vui vẻ, lễ kỷ niệm, hoặc thành tựu được công nhận. Hãy chia sẻ niềm vui với gia đình và bạn bè. Đây là lúc nghỉ ngơi và tận hưởng thành quả.", "reversed": "Căng thẳng trong gia đình, bất đồng cộng đồng, hoặc cảm thấy không thuộc về nơi nào. Có thể bạn đang bỏ lỡ lễ kỷ niệm quan trọng. Hãy kết nối lại.", "love": "Tình yêu vững chắc, có thể tiến tới hôn nhân hoặc sinh con. Nếu độc thân, hãy tham gia các sự kiện xã hội — tình yêu có thể đến từ bạn bè.", "career": "Hoàn thành mốc quan trọng, được công ty công nhận. Hãy ăn mừng với đồng nghiệp. Tài chính ổn định, có thể có lợi nhuận từ bất động sản.", "spirituality": "Tìm cộng đồng tâm linh để thuộc về. Lễ hội, nghi thức nhóm có thể mang lại cảm giác kết nối sâu sắc mà bạn đang cần."}, {"id": "wands-5", "name": "Five of Wands", "vietnameseName": "Năm Gậy", "number": "5", "arcana": "minor", "suit": "wands", "keywords": "Xung đột, cạnh tranh, nỗ lực, bất đồng, hỗn loạn", "upright": "Có sự cạnh tranh hoặc xung đột xung quanh bạn. Đây có thể là cuộc chiến lành mạnh thúc đẩy bạn tiến bộ, nhưng cũng có thể là hỗn loạn vô ích. Hãy chọn trận chiến đáng đánh.", "reversed": "Tránh xung đột, hòa giải, hoặc cảm thấy kiệt sức vì tranh cãi. Đôi khi rút lui là khôn ngoan. Hãy tìm giải pháp đôi bên cùng có lợi.", "love": "Cãi vã trong tình yêu, ganh đua, hoặc nhiều người theo đuổi cùng lúc. Nếu độc thân, đừng chơi trò cạnh tranh. Nếu đã có đôi, hãy ngồi xuống nói chuyện thẳng thắn.", "career": "Môi trường làm việc cạnh tranh cao. Hãy bảo vệ ý tưởng của mình. Tài chính cần thận trọng — đừng tham gia vào các cuộc chơi rủi ro.", "spirituality": "Nội chiến tinh thần — các mong muốn bên trong đang xung đột. Hãy ngồi lại, lắng nghe từng 'tiếng nói' và tìm giải pháp hòa giải."}, {"id": "wands-6", "name": "Six of Wands", "vietnameseName": "Sáu Gậy", "number": "6", "arcana": "minor", "suit": "wands", "keywords": "Chiến thắng, công nhận, tự hào, lãnh đạo, thành công", "upright": "Bạn đang được tán dương và công nhận. Thành công rõ ràng, mọi người tin tưởng khả năng lãnh đạo của bạn. Hãy tận hưởng vinh quang nhưng đừng kiêu ngạo.", "reversed": "Sợ thất bại, thiếu tự tin, hoặc công nhận bị trì hoãn. Có thể bạn đang so sánh bản thân với người khác. Hãy nhìn vào tiến bộ của mình.", "love": "Tình yêu đang thăng hoa, được mọi người ủng hộ. Nếu độc thân, bạn thu hút sự chú ý tích cực. Nếu đã có đôi, hãy công khai tự hào về đối phương.", "career": "Thăng tiến, được thăng chức, hoặc dự án thành công vang dội. Tài chính tăng từ thành tựu công khai. Hãy đầu tư vào danh tiếng.", "spirituality": "Cảm nhận sự hỗ trợ từ vũ trụ hoặc người hướng dẫn. Bạn đang đi đúng hướng. Hãy tiếp tục với lòng biết ơn và khiêm tốn."}, {"id": "wands-7", "name": "Seven of Wands", "vietnameseName": "Bảy Gậy", "number": "7", "arcana": "minor", "suit": "wands", "keywords": "Bảo vệ, kiên trì, đứng lên, vị thế của mình, thử thách", "upright": "Bạn đang phải bảo vệ thành quả hoặc quan điểm của mình trước sự phản đối. Hãy đứng vững, tin tưởng vào giá trị của bản thân. Chiến thắng đến từ kiên trì.", "reversed": "Mệt mỏi vì phải đấu tranh liên tục, hoặc bỏ cuộc giữa chừng. Có thể bạn đang bảo vệ điều không đáng. Hãy xem lại: cuộc chiến này có ý nghĩa không?", "love": "Tình yêu cần bảo vệ trước sự can thiệp từ bên ngoài. Nếu độc thân, đừng để áp lực xã hội ép bạn yêu ai đó. Nếu đã có đôi, hãy đứng về phía nhau.", "career": "Cạnh tranh khốc liệt tại nơi làm việc. Bạn cần chứng minh giá trị của mình. Tài chính cần bảo vệ — đừng cho vay, đừng ký tên chung.", "spirituality": "Bảo vệ niềm tin của mình trước nghi ngờ. Hãy vững vàng trong thực hành, dù người khác không hiểu. Con đường tâm linh đôi khi cô độc."}, {"id": "wands-8", "name": "Eight of Wands", "vietnameseName": "Tám Gậy", "number": "8", "arcana": "minor", "suit": "wands", "keywords": "Hành động nhanh, tiến triển, thông tin, du lịch, đà năng lượng", "upright": "Mọi thứ đang diễn ra nhanh chóng. Tin tức tốt đang bay đến. Hãy tận dụng đà này để đẩy mạnh dự án hoặc lên kế hoạch du lịch. Thời gian là vàng.", "reversed": "Chậm trễ, cản trở, hoặc thông tin sai lệch. Có thể bạn đang vội vàng đến mức bỏ sót chi tiết quan trọng. Hãy kiểm tra lại trước khi gửi đi.", "love": "Tình yêu phát triển nhanh, hoặc tin nhắn quan trọng từ đối phương. Nếu độc thân, hãy sẵn sàng cho một cuộc gặp bất ngờ. Nếu đã có đôi, hãy cùng nhau đi đâu đó.", "career": "Công việc tiến triển vượt kế hoạch. Hãy đáp ứng nhanh. Tài chính có thể có tin vui bất ngờ — hoàn thuế, thưởng, hoặc nợ được trả.", "spirituality": "Năng lượng tâm linh đang chuyển động mạnh. Hãy thực hành năng động — yoga, qigong, hoặc thiền đi bộ. Đừng để năng lượng tắc nghẽn."}, {"id": "wands-9", "name": "Nine of Wands", "vietnameseName": "Chín Gậy", "number": "9", "arcana": "minor", "suit": "wands", "keywords": "Kiên cường, cuối cùng, phòng thủ, mệt mỏi, gần đích", "upright": "Bạn đã trải qua nhiều thử thách và đang ở vòng cuối cùng. Hãy kiên trì thêm chút nữa. Bạn mệt nhưng chưa bị đánh bại. Sự kiên cường của bạn sẽ được đền đáp.", "reversed": "Kiệt sức, hoài nghi, hoặc bỏ cuộc trước khi đến đích. Có thể bạn đang phòng thủ quá mức, không cho ai vào cuộc sống. Hãy nhận giúp đỡ.", "love": "Tình yêu đã qua nhiều thử thách. Nếu độc thân, đừng để vết thương cũ ngăn bạn mở lòng. Nếu đã có đôi, hãy cùng nhau vượt qua chặng cuối.", "career": "Dự án sắp hoàn thành nhưng bạn kiệt sức. Hãy nghỉ ngơi ngắn. Tài chính ổn định nhưng đừng mở thêm khoản đầu tư mới lúc này.", "spirituality": "Thử thách tâm linh đã rèn luyện bạn thành người mạnh mẽ hơn. Hãy chia sẻ kinh nghiệm để giúp người khác. Sự kiên trì là chìa khóa giác ngộ."}, {"id": "wands-10", "name": "Ten of Wands", "vietnameseName": "Mười Gậy", "number": "10", "arcana": "minor", "suit": "wands", "keywords": "Gánh nặng, trách nhiệm, kiệt sức, làm việc quá sức, gần hoàn thành", "upright": "Bạn đang gánh vác quá nhiều trách nhiệm. Hãy xem lại danh sách việc làm và buông bỏ những gì không thực sự cần thiết. Sắp đến đích rồi, đừng gục ngã trước vạch đích.", "reversed": "Giải tỏa gánh nặng, học cách từ chối, hoặc chia sẻ công việc. Bạn không cần làm tất cả một mình. Hãy để người khác giúp đỡ.", "love": "Tình yêu trở nên nặng nề vì trách nhiệm. Nếu độc thân, đừng để công việc chiếm hết thời gian cho tình yêu. Nếu đã có đôi, hãy chia sẻ gánh nặng gia đình.", "career": "Quá tải công việc, làm thêm giờ liên tục. Hãy đàm phán lại phân công. Tài chính tốt nhưng đánh đổi bằng sức khỏe — không đáng.", "spirituality": "Gánh nặng tâm linh — bạn đang cố giúp quá nhiều người. Hãy đặt ranh giới. Chỉ khi bạn khỏe mạnh mới có thể giúp người khác."}, {"id": "wands-page", "name": "Page of Wands", "vietnameseName": "Hoàng Tử Gậy", "number": "Page", "arcana": "minor", "suit": "wands", "keywords": "Khám phá, nhiệt huyết, tin vui, sáng tạo mới", "upright": "Một ý tưởng mới đầy năng lượng đang đến. Hãy theo đuổi với sự tò mò và can đảm. Tin tốt từ xa, hoặc một người trẻ tuổi truyền cảm hứng.", "reversed": "Thiếu hướng đi, ý tưởng nông cạn, hoặc tin đồn thiếu căn cứ. Cẩn thận với những kế hoạch hão huyền. Cần kiên nhẫn trau dồi trước khi hành động.", "love": "Tình yêu mới đầy phấn khích. Nếu độc thân, hãy chủ động làm quen. Nếu đã có đôi, thêm chút bất ngờ vào mối quan hệ. Tránh nóng vội đánh giá đối phương.", "career": "Dự án sáng tạo khởi động, hoặc học việc mới. Hãy giữ tinh thần học hỏi. Tài chính có tin tốt nhưng chưa lớn — đầu tư vào kiến thức.", "spirituality": "Năng lượng mới trong hành trình tâm linh. Hãy thử nghiệm các phương pháp mới với tâm thế vui vẻ, không áp lực. Mọi thứ đều là bước đầu."}, {"id": "wands-knight", "name": "Knight of Wands", "vietnameseName": "Hiệp Sĩ Gậy", "number": "Knight", "arcana": "minor", "suit": "wands", "keywords": "Hành động, phiêu lưu, can đảm, đam mê, nóng vội", "upright": "Thời điểm hành động nhanh và quyết liệt. Bạn có năng lượng dồi dào để chinh phục mục tiêu. Hãy tận dụng đà này nhưng có kế hoạch rút lui nếu cần.", "reversed": "Nóng vội, thiếu kiên nhẫn, bốc đồng gây ra rắc rối. Có thể đang lao vào việc chưa chuẩn bị kỹ. Hãy chậm lại trước khi đốt cháy cầu.", "love": "Tình yêu nồng nhiệt nhưng có thể chóng tàn. Nếu độc thân, hãy tận hưởng nhưng đừng vội cam kết. Nếu đã có đôi, tránh cãi vã vì tính tự cao.", "career": "Công việc đòi hỏi sự nhanh nhẹn và quyết đoán — bán hàng, marketing, hoặc khởi nghiệp. Tài chính có lúc lên nhanh nhưng cần quản lý rủi ro.", "spirituality": "Năng lượng lửa cao — hãy dẫn vào thiền động, vũ đạo, hoặc thể thao mạnh. Tránh để năng lượng bị tắc nghẽn thành cáu gắt."}, {"id": "wands-queen", "name": "Queen of Wands", "vietnameseName": "Nữ Hoàng Gậy", "number": "Queen", "arcana": "minor", "suit": "wands", "keywords": "Tự tin, nhiệt huyết, quyến rũ, độc lập, sáng tạo", "upright": "Bạn đang tỏa sáng với sự tự tin và nhiệt huyết. Hãy dẫn dắt bằng cả trái tim và bản lĩnh. Người khác bị thu hút bởi năng lượng tích cực của bạn.", "reversed": "Tự cao, ghen tuông, hoặc kiểm soát bằng cảm xúc. Có thể đang dùng sự quyến rũ để thao túng. Hãy nhìn lại động cơ thật của mình.", "love": "Tình yêu đầy lửa và sự tôn trọng lẫn nhau. Nếu độc thân, bạn thu hút người đáng tin cậy. Nếu đã có đôi, hãy cùng nhau làm chủ cuộc sống.", "career": "Lãnh đạo bằng cảm hứng, đặc biệt trong lĩnh vực sáng tạo hoặc kinh doanh. Tài chính tốt nhờ sự tự tin và quyết đoán. Hãy đầu tư vào đam mê.", "spirituality": "Năng lượng nữ tính mạnh mẽ, độc lập. Hãy kết nối với nguyên tố lửa — nến, lò sưởi, tắm nắng hoàng hôn. Tự tin vào trực giác của phụ nữ."}, {"id": "wands-king", "name": "King of Wands", "vietnameseName": "Vua Gậy", "number": "King", "arcana": "minor", "suit": "wands", "keywords": "Lãnh đạo, tầm nhìn, doanh nhân, quyết đoán, có ảnh hưởng", "upright": "Bạn có tầm nhìn rõ ràng và khả năng thuyết phục người khác theo đuổi. Đây là lúc dẫn dắt, khởi xướng, hoặc mở rộng kinh doanh. Hãy hành động với sự khôn ngoan.", "reversed": "Độc đoán, thiếu kiên nhẫn, hoặc dùng quyền lực sai cách. Có thể đang ép buộc người khác theo ý mình. Hãy lắng nghe ý kiến phản biện.", "love": "Tình yêu cần sự cam kết và tầm nhìn chung. Nếu độc thân, bạn thu hút người có chí hướng. Nếu đã có đôi, hãy cùng nhau xây dựng tương lai rõ ràng.", "career": "Thăng tiến lên vị trí lãnh đạo, hoặc khởi nghiệp thành công. Tài chính dồi dào từ các quyết định táo bạo đúng thời điểm. Hãy đầu tư dài hạn.", "spirituality": "Lãnh đạo tinh thần — bạn có khả năng truyền cảm hứng cho cộng đồng. Hãy chia sẻ tầm nhìn của mình một cách khiêm tốn. Sức mạnh đến từ phục vụ."}, {"id": "cups-ace", "name": "Ace of Cups", "vietnameseName": "Át Cốc", "number": "Ace", "arcana": "minor", "suit": "cups", "keywords": "Tình yêu mới, cảm xúc dâng trào, hạnh phúc, sáng tạo nghệ thuật", "upright": "Trái tim bạn đang tràn đầy. Một cảm xúc mới — tình yêu, lòng biết ơn, hoặc cảm hứng nghệ thuật — đang tuôn chảy. Hãy mở lòng đón nhận và chia sẻ.", "reversed": "Cảm xúc bị kìm nén, tình yêu không được đáp lại, hoặc sáng tạo bị chặn. Có thể bạn đang khóc trong im lặng. Hãy tìm người an toàn để chia sẻ.", "love": "Tình yêu đích thực đang đến — sâu sắc, chân thành. Nếu độc thân, hãy mở lòng hoàn toàn. Nếu đã có đôi, một giai đoạn mới đầy yêu thương bắt đầu.", "career": "Công việc mang lại niềm vui và sự thỏa mãn cảm xúc. Hãy theo đuổi đam mê. Tài chính ổn định nhưng hạnh phúc đến từ việc làm ý nghĩa hơn là tiền.", "spirituality": "Trái tim mở ra với vũ trụ. Hãy thiền về lòng biết ơn, hoặc đơn giản là khóc để giải phóng. Nước mắt là nước rửa linh hồn."}, {"id": "cups-2", "name": "Two of Cups", "vietnameseName": "Hai Cốc", "number": "2", "arcana": "minor", "suit": "cups", "keywords": "Kết nối, đối tác, hài hòa, tình yêu đích thực, giao kèo", "upright": "Một mối quan hệ cân bằng và đẹp đẽ đang hình thành. Dù là tình yêu, hôn nhân, hay đối tác kinh doanh — đây là sự kết hợp hài hòa. Hãy nâng niu.", "reversed": "Mất cân bằng trong quan hệ, giao kèo bị phá vỡ, hoặc hiểu lầm. Có thể bạn đang cho nhiều hơn nhận. Hãy thảo luận lại cam kết.", "love": "Tình yêu đôi lứa, sự đồng điệu sâu sắc. Nếu độc thân, hãy tìm người có cùng giá trị. Nếu đã có đôi, hãy tôn vinh sự kết nối đặc biệt của hai bạn.", "career": "Hợp tác kinh doanh tốt, đối tác tin cậy. Hãy ký kết hợp đồng với niềm tin. Tài chính tăng từ quan hệ đối tác hoặc hôn nhân.", "spirituality": "Kết nối tâm linh sâu sắc với người khác hoặc với vũ trụ. Thiền đôi hoặc cầu nguyện chung tăng cường năng lượng."}, {"id": "cups-3", "name": "Three of Cups", "vietnameseName": "Ba Cốc", "number": "3", "arcana": "minor", "suit": "cups", "keywords": "Vui vẻ, tụ họp, tình bạn, ăn mừng, cộng đồng", "upright": "Một sự kiện vui vẻ với bạn bè hoặc gia đình đang đến. Hãy ăn mừng, kết nối, và tận hưởng sự ủng hộ từ cộng đồng. Bạn không đơn độc.", "reversed": "Cô đơn giữa đám đông, xung đột nhóm, hoặc quá chú trọng tiệc tùng. Có thể bạn đang né tránh vấn đề cá nhân bằng vui chơi. Hãy đối mặt với cảm xúc thật.", "love": "Tình yêu phát triển từ tình bạn. Nếu độc thân, hãy tham gia các hoạt động nhóm. Nếu đã có đôi, hãy cùng nhau đi chơi với bạn bè — vui vẻ sẽ gắn kết.", "career": "Môi trường làm việc thân thiện, teamwork tốt. Hãy tổ chức sự kiện gắn kết. Tài chính ổn định, có thể có lợi ích từ mối quan hệ xã hội.", "spirituality": "Tìm cộng đồng tâm linh để chia sẻ. Lễ hội, vũ hội, hoặc đơn giản là cùng nhau ca hát có thể nâng cao tần số năng lượng."}, {"id": "cups-4", "name": "Four of Cups", "vietnameseName": "Bốn Cốc", "number": "4", "arcana": "minor", "suit": "cups", "keywords": "Thiếu hài lòng, chán nản, lỡ cơ hội, suy ngẫm, rút lui", "upright": "Bạn đang cảm thấy chán nản hoặc thiếu hứng thú dù mọi thứ ổn. Hãy xem lại: có phải bạn đang bỏ qua cơ hội tốt vì quá tập trung vào điều không có? Mở mắt ra.", "reversed": "Tìm lại niềm vui, chấp nhận lời mời, hoặc thoát khỏi trạng thái trì trệ. Bạn đã sẵn sàng đón nhận những gì vũ trụ đang mang đến. Hãy nói 'có'.", "love": "Tình yêu đang ở giai đoạn nhàm chán. Nếu độc thân, đừng từ chối người tốt vì lý do vô lý. Nếu đã có đôi, hãy thử điều mới để thắp lại lửa.", "career": "Công việc ổn định nhưng không thú vị. Có thể có cơ hội mới bạn đang bỏ qua. Tài chính đủ dùng nhưng bạn muốn nhiều hơn — hãy xem lại kỳ vọng.", "spirituality": "Rút lui để suy ngẫm về hành trình tâm linh. Nhưng đừng ngồi mãi — hãy thực hành. Đôi khi sự giác ngộ đến từ việc tham gia, không phải quan sát."}, {"id": "cups-5", "name": "Five of Cups", "vietnameseName": "Năm Cốc", "number": "5", "arcana": "minor", "suit": "cups", "keywords": "Mất mát, hối tiếc, đau buồn, tập trung vào cái đã mất, chữa lành", "upright": "Bạn đang đau buồn vì một sự mất mát. Hãy khóc, hãy đau, nhưng đừng quên vẫn còn hai cốc đứng vững phía sau. Chữa lành cần thời gian, nhưng hy vọng vẫn còn.", "reversed": "Bắt đầu hồi phục, tìm lại niềm vui, hoặc nhận ra mất mát không lớn như tưởng tượng. Bạn đang sẵn sàng ngước lên và bước tiếp. Hãy tha thứ cho bản thân.", "love": "Thất tình, chia tay, hoặc cảm thấy bị bỏ rơi. Nếu độc thân, hãy cho bản thân thời gian buồn. Nếu đã có đôi, hãy cùng nhau vượt qua mất mát.", "career": "Thất bại dự án, mất khách hàng, hoặc đầu tư lỗ. Hãy rút kinh nghiệm và tìm cơ hội mới. Tài chính cần thắt lưng buộc bụng tạm thời.", "spirituality": "Đau đớn tinh thần là một phần của sự trưởng thành. Hãy để nước mắt rửa sạch linh hồn. Sau mưa, trời lại sáng — đó là quy luật."}, {"id": "cups-6", "name": "Six of Cups", "vietnameseName": "Sáu Cốc", "number": "6", "arcana": "minor", "suit": "cups", "keywords": "Hoài niệm, trẻ thơ, quá khứ, tử tế, quà tặng", "upright": "Một ký ức đẹp hoặc người từ quá khứ quay lại. Hãy tận hưởng sự ngây thơ và lòng tốt. Quà tặng nhỏ mang ý nghĩa lớn. Hãy sống chậm lại.", "reversed": "Mắc kẹt trong quá khứ, không trưởng thành, hoặc sống bằng ký ức. Có thể bạn đang so sánh hiện tại với 'thuở ấy' và thất vọng. Hãy sống hiện tại.", "love": "Tình yêu cũ có thể quay lại, hoặc bạn gặp người quen từ thuở nhỏ. Nếu độc thân, hãy tìm kiếm sự chân thành. Nếu đã có đôi, hãy cùng nhau ôn lại kỷ niệm.", "career": "Dự án liên quan đến quá khứ, di sản, hoặc giáo dục trẻ em. Tài chính có thể có lợi ích từ gia đình hoặc di sản. Hãy đầu tư vào thế hệ tương lai.", "spirituality": "Kết nối lại với 'đứa trẻ bên trong'. Chơi đùa, sáng tạo vô tư lự, hoặc tham gia hoạt động thiện nguyện với trẻ em sẽ chữa lành tâm hồn."}, {"id": "cups-7", "name": "Seven of Cups", "vietnameseName": "Bảy Cốc", "number": "7", "arcana": "minor", "suit": "cups", "keywords": "Lựa chọn, ảo tưởng, mơ mộng, cám dỗ, nhiều khả năng", "upright": "Nhiều lựa chọn đang mở ra, nhưng không phải tất cả đều thực. Hãy phân biệt giữa mơ ước và thực tế. Tưởng tượng tốt nhưng cần hành động cụ thể.", "reversed": "Thiếu lựa chọn, mơ mộng hão, hoặc bị lừa dối bởi vẻ ngoài. Có thể bạn đang chạy theo ảo ảnh. Hãy đặt chân xuống đất và đánh giá thực tế.", "love": "Nhiều người theo đuổi hoặc nhiều khả năng trong tình yêu. Nếu độc thân, hãy chọn người thực sự phù hợp chứ không phải người 'có vẻ' hoàn hảo. Nếu đã có đôi, hãy thẳng thắn về mong muốn.", "career": "Nhiều cơ hội nhưng cần phân tích kỹ. Tránh đầu tư vào 'kế hoạch hão'. Tài chính có thể bị ảo tưởng về của cải — hãy kiểm tra sổ sách.", "spirituality": "Khám phá nhiều con đường tâm linh là tốt, nhưng đừng nhảy từ cái này sang cái khác mà không đào sâu. Hãy chọn một phương pháp và thực hành kiên trì."}, {"id": "cups-8", "name": "Eight of Cups", "vietnameseName": "Tám Cốc", "number": "8", "arcana": "minor", "suit": "cups", "keywords": "Rời bỏ, tìm kiếm ý nghĩa, buông bỏ, hành trình mới, can đảm", "upright": "Bạn đang rời bỏ điều không còn phục vụ bạn — dù nó từng tốt đẹp. Đây là hành động can đảm. Hãy tin rằng phía trước có thứ xứng đáng hơn.", "reversed": "Sợ rời bỏ, bám víu vào quá khứ, hoặc trốn tránh vấn đề. Có thể bạn đang chạy trốn thay vì giải quyết. Hãy nhìn rõ động cơ của mình.", "love": "Chia tay để tìm tình yêu đích thực. Nếu độc thân, bạn đang sẵn sàng buông bỏ tiêu chuẩn cũ. Nếu đã có đôi, hãy cùng nhau tìm lại ý nghĩa mối quan hệ.", "career": "Nghỉ việc để tìm công việc ý nghĩa hơn, hoặc từ bỏ dự án không đúng hướng. Tài chính có thể giảm tạm thời nhưng sẽ ổn nếu có kế hoạch.", "spirituality": "Hành hương tinh thần — rời bỏ niềm tin cũ để tìm chân lý sâu hơn. Hãy can đảm bước vào vùng chưa biết. Giác ngộ đang ở phía trước."}, {"id": "cups-9", "name": "Nine of Cups", "vietnameseName": "Chín Cốc", "number": "9", "arcana": "minor", "suit": "cups", "keywords": "Hạnh phúc, thỏa mãn, ước mơ thành hiện thực, tự hào, dư dả", "upright": "'Lá bài điều ước' — bạn đang ở trạng thái thỏa mãn sâu sắc. Hầu hết mong muốn đã thành hiện thực. Hãy tận hưởng và bày tỏ lòng biết ơn.", "reversed": "Thiếu thỏa mãn, ước mơ hão, hoặc tự mãn quá mức. Có thể bạn đạt được mục tiêu nhưng cảm thấy trống rỗng. Hãy xem lại đâu là điều thực sự quan trọng.", "love": "Tình yêu viên mãn, thỏa mãn cảm xúc. Nếu độc thân, hãy yêu bản thân trước — đó là nền tảng. Nếu đã có đôi, hãy nói lời cảm ơn đối phương.", "career": "Thành công sự nghiệp, dự án mang lại niềm tự hào. Tài chính dư dả — hãy tự thưởng cho mình nhưng đừng phung phí.", "spirituality": "Cảm giác kết nối hoàn hảo với vũ trụ. Hãy ước mơ lớn và tin rằng chúng sẽ thành hiện thực. Lòng biết ơn là chìa khóa mở ra nhiều phước lành hơn."}, {"id": "cups-10", "name": "Ten of Cups", "vietnameseName": "Mười Cốc", "number": "10", "arcana": "minor", "suit": "cups", "keywords": "Hạnh phúc gia đình, hài hòa, tình yêu hoàn hảo, cộng đồng, viên mãn", "upright": "Sự viên mãn tột cùng trong tình yêu và gia đình. Mọi thứ đều ở đúng chỗ. Hãy tận hưởng hạnh phúc này và chia sẻ với cộng đồng.", "reversed": "Xung đột gia đình, mối quan hệ bề ngoài hạnh phúc nhưng bên trong rạn nứt. Có thể bạn đang ép mọi người vào khuôn mẫu 'hoàn hảo'. Hãy chấp nhận không hoàn hảo.", "love": "Tình yêu đích thực, hôn nhân hạnh phúc, hoặc gia đình mở rộng. Nếu độc thân, hãy tìm kiếm mối quan hệ có tiềm năng dài hạn. Nếu đã có đôi, hãy xây tổ ấm.", "career": "Môi trường làm việc như gia đình, đồng nghiệp hỗ trợ. Tài chính viên mãn, có thể mua nhà hoặc đầu tư cho gia đình.", "spirituality": "Kết nối với cộng đồng tâm linh như gia đình. Hãy tổ chức nghi lễ nhóm, lễ cưới, hoặc lễ đầy tháng. Tình yêu vô điều kiện là đỉnh cao tâm linh."}, {"id": "cups-page", "name": "Page of Cups", "vietnameseName": "Hoàng Tử Cốc", "number": "Page", "arcana": "minor", "suit": "cups", "keywords": "Tin nhắn tình cảm, sáng tạo nghệ thuật, nhạy cảm, mơ mộng", "upright": "Một thông điệp yêu thương hoặc lời mời đầy cảm xúc đang đến. Hãy mở lòng đón nhận. Đây cũng là lúc sáng tạo nghệ thuật, thơ ca, âm nhạc.", "reversed": "Thiếu thực tế, cảm xúc lấn át lý trí, hoặc tin tức không như mong đợi. Có thể bạn đang sống quá nhiều trong mơ mộng. Hãy đặt chân xuống đất.", "love": "Tình yêu ngọt ngào, lãng mạn đang nảy nở. Nếu độc thân, một lời tỏ tình dễ thương sắp đến. Nếu đã có đôi, hãy viết thư tay hoặc làm điều bất ngờ.", "career": "Công việc đòi hỏi sự sáng tạo và cảm xúc — nghệ thuật, thiết kế, tư vấn. Hãy tin vào cảm hứng bất chợt. Tài chính ổn định, có thể có quà tặng nhỏ.", "spirituality": "Mở lòng đón nhận tình yêu vũ trụ. Thiền về trái tim, lắng nghe cảm xúc mà không phán xét. Nghệ thuật là cửa ngõ tâm linh."}, {"id": "cups-knight", "name": "Knight of Cups", "vietnameseName": "Hiệp Sĩ Cốc", "number": "Knight", "arcana": "minor", "suit": "cups", "keywords": "Lãng mạn, theo đuổi, đề nghị, cảm xúc sâu sắc, nghệ sĩ", "upright": "Một lời đề nghị tình cảm hoặc cơ hội sáng tạo đang đến. Hãy theo đuổi bằng trái tim nhưng đừng quên thực tế. Một người lãng mạn sắp xuất hiện.", "reversed": "Thiếu cam kết, lãng mạn hão, hoặc trốn tránh bằng cảm xúc. Có thể bạn đang yêu trong tưởng tượng hơn là thực tế. Hãy nhìn rõ người trước mặt.", "love": "Tình yêu đẹp nhưng chưa chắc đã bền. Nếu độc thân, hãy tận hưởng sự ve vãn nhưng đừng vội tin vào lời hứa. Nếu đã có đôi, cần hành động chứ không chỉ nói.", "career": "Công việc liên quan đến nghệ thuật, quan hệ công chúng, hoặc đàm phán bằng cảm xúc. Tài chính có cơ hội từ dự án sáng tạo. Hãy đề xuất ý tưởng táo bạo.", "spirituality": "Theo đuổi tâm linh bằng cảm xúc và trái tim. Hãy để nghệ thuật, âm nhạc, hoặc thiên nhiên dẫn dắt bạn đến trải nghiệm thiêng liêng."}, {"id": "cups-queen", "name": "Queen of Cups", "vietnameseName": "Nữ Hoàng Cốc", "number": "Queen", "arcana": "minor", "suit": "cups", "keywords": "Trực giác, nuôi dưỡng, đồng cảm, tình yêu vô điều kiện, sâu sắc", "upright": "Bạn đang kết nối sâu sắc với cảm xúc của mình và người khác. Hãy lắng nghe trực giác — nó cực kỳ chính xác lúc này. Là người hỗ trợ, lắng nghe viên tuyệt vời.", "reversed": "Quá nhạy cảm, dễ tổn thương, hoặc lệ thuộc cảm xúc. Bạn có thể đang uốn mình theo ý người khác để được yêu thương. Hãy đặt ranh giới bảo vệ trái tim.", "love": "Tình yêu sâu sắc, đồng cảm. Nếu độc thân, hãy tin vào cảm giác mách bảo về ai đó. Nếu đã có đôi, hãy tạo không gian an toàn để cả hai chia sẻ cảm xúc thật.", "career": "Công việc đòi hỏi sự đồng cảm — tư vấn, chăm sóc, nghệ thuật trị liệu. Tài chính ổn định nhưng đừng cho vay tiền vì cảm xúc. Hãy bảo vệ tài sản.", "spirituality": "Trực giác cao nhạy — hãy ghi chép giấc mơ, làm việc với nước (tắm biển, thiền dưới mưa). Trái tim bạn là cổng thông tin tâm linh."}, {"id": "cups-king", "name": "King of Cups", "vietnameseName": "Vua Cốc", "number": "King", "arcana": "minor", "suit": "cups", "keywords": "Kiểm soát cảm xúc, đồng cảm trưởng thành, tư vấn, bình tĩnh, cân bằng", "upright": "Bạn đã trưởng thành trong việc xử lý cảm xúc. Có thể giúp người khác vượt qua khủng hoảng mà không bị cuốn theo. Sự điềm tĩnh của bạn là vũ khí mạnh nhất.", "reversed": "Lạnh lùng, thao túng cảm xúc, hoặc đè nén cảm xúc quá mức. Có thể bạn đang dùng sự hiểu biết để kiểm soát người khác. Hãy thành thật với cảm xúc của mình.", "love": "Tình yêu trưởng thành, ổn định. Nếu độc thân, bạn thu hút người cân bằng cảm xúc. Nếu đã có đôi, hãy cùng nhau xây dựng tổ ấm dựa trên sự tin tưởng.", "career": "Lãnh đạo bằng sự đồng cảm trong ngành chăm sóc, tư vấn, hoặc sáng tạo. Tài chính ổn định nhờ quyết định cân nhắc. Hãy đầu tư vào giáo dục cảm xúc.", "spirituality": "Trở thành người hướng dẫn tinh thần cho người khác bằng sự bình tĩnh và trí tuệ cảm xúc. Thiền về lòng từ bi không giới hạn."}, {"id": "swords-ace", "name": "Ace of Swords", "vietnameseName": "Át Kiếm", "number": "Ace", "arcana": "minor", "suit": "swords", "keywords": "Sự thật, ý tưởng mới, sáng suốt, chiến thắng, công lý", "upright": "Một ý tưởng đột phá hoặc sự thật sáng rõ đang xuất hiện. Hãy cắt đứt sự mơ hồ bằng lý trí sắc bén. Đây là khởi đầu của sự rõ ràng và công lý.", "reversed": "Sự thật gây đau, ý tưởng độc hại, hoặc lời lẽ sắc đến mức làm tổn thương. Có thể bạn đang dùng logic để biện minh cho hành vi xấu. Hãy thêm chút cảm xúc.", "love": "Tình yêu cần sự thật thẳng thắn. Nếu độc thân, hãy rõ ràng về ý định. Nếu đã có đôi, hãy giải quyết vấn đề bằng giao tiếp trung thực.", "career": "Khởi đầu dự án đòi hỏi trí tuệ, pháp lý, hoặc công nghệ. Hãy bảo vệ ý tưởng. Tài chính có thể có quyết định quan trọng cần phân tích kỹ.", "spirituality": "Giác ngộ đột ngột — 'aha moment' về chân lý sâu sắc. Hãy ghi chép lại. Kiếm sắc của trí tuệ cần được dùng để bảo vệ, không phải tấn công."}, {"id": "swords-2", "name": "Two of Swords", "vietnameseName": "Hai Kiếm", "number": "2", "arcana": "minor", "suit": "swords", "keywords": "Bế tắc, lựa chọn khó, phủ nhận, cân bằng, che mắt", "upright": "Bạn đang ở ngã ba đường và không muốn chọn. Sự thật là bạn đã biết câu trả lời nhưng sợ hậu quả. Hãy bỏ bịt mắt xuống, đối mặt với sự thật, và chọn.", "reversed": "Trì hoãn quyết định đã quá lâu, hoặc đưa ra lựa chọn sai vì thiếu thông tin. Có thể bạn đang né tránh xung đột. Hãy thu thập thêm dữ liệu rồi quyết.", "love": "Tình yêu bế tắc vì không ai chịu nhượng bộ. Nếu độc thân, bạn đang đóng cửa trái tim vì sợ bị tổn thương. Nếu đã có đôi, hãy tháo bỏ giáp.", "career": "Cần quyết định quan trọng về hợp đồng hoặc đối tác. Hãy tìm luật sư nếu cần. Tài chính ổn định nhưng cần chọn hướng đầu tư.", "spirituality": "Bế tắc tinh thần — đầu óc tranh cãi với trái tim. Hãy thiền để tĩnh lặng, rồi để trực giác dẫn đường. Đôi khi không chọn cũng là một lựa chọn."}, {"id": "swords-3", "name": "Three of Swords", "vietnameseName": "Ba Kiếm", "number": "3", "arcana": "minor", "suit": "swords", "keywords": "Đau đớn, tan vỡ, mất mát, buồn bã, phản bội", "upright": "Trái tim đang tan vỡ — chia tay, phản bội, hoặc tin xấu. Hãy cho phép bản thân đau đớn. Đây là một phần của sống, không phải kết thúc. Thời gian sẽ chữa lành.", "reversed": "Bắt đầu hồi phục sau đau đớn, tha thứ, hoặc nhận ra bài học từ tan vỡ. Bạn đang mạnh hơn sau khi vượt qua. Hãy mở lòng trở lại.", "love": "Chia tay, ly hôn, hoặc phản bội. Nếu độc thân, hãy chữa lành trước khi yêu lại. Nếu đã có đôi, hãy thảo luận về vấn đề sâu sắc đang làm rạn nứt.", "career": "Thất bại dự án, mất việc, hoặc tin xấu từ công ty. Tài chính bị ảnh hưởng. Hãy dựa vào tiền dự phòng và không đưa ra quyết định lớn khi đang đau.", "spirituality": "Tan vỡ niềm tin có thể là bước cần thiết để xây lại hệ thống vững hơn. Hãy để nỗi đau tinh thần rửa sạch những gì giả dối."}, {"id": "swords-4", "name": "Four of Swords", "vietnameseName": "Bốn Kiếm", "number": "4", "arcana": "minor", "suit": "swords", "keywords": "Nghỉ ngơi, phục hồi, suy ngẫm, tĩnh lặng, nạp năng lượng", "upright": "Bạn cần nghỉ ngơi nghiêm túc — không chỉ thể chất mà cả tinh thần. Hãy rút lui, ngắt kết nối, và phục hồi. Sự tĩnh lặng sẽ mang lại câu trả lời.", "reversed": "Mất năng lượng, trầm cảm, hoặc cô lập quá mức. Có thể bạn đang trốn tránh thay vì nghỉ ngơi. Hãy tìm người hỗ trợ.", "love": "Tình yêu cần khoảng lặng. Nếu độc thân, đây là lúc tập trung vào bản thân. Nếu đã có đôi, hãy dành thời gian riêng để tránh cãi vã.", "career": "Nghỉ phép, làm việc từ xa, hoặc tạm dừng dự án. Sức khỏe tinh thần quan trọng hơn deadline. Tài chính ổn định, đừng lo lắng quá mức.", "spirituality": "Thiền tĩnh lặng sâu, hoặc tham gia khóa retreat. Đây là lúc nạp lại năng lượng tâm linh. Hãy ngủ đủ giấc — giấc ngủ là cổng thông tin giác ngộ."}, {"id": "swords-5", "name": "Five of Swords", "vietnameseName": "Năm Kiếm", "number": "5", "arcana": "minor", "suit": "swords", "keywords": "Xung đột, chiến thắng rỗng, thất bại, ích kỷ, phá hoại", "upright": "Bạn có thể đã thắng trận nhưng thua cả cuộc chiến. Chiến thắng bằng mọi giá đánh đổi bằng mối quan hệ. Hãy xem lại: đâu là chiến thắng thực sự?", "reversed": "Hòa giải, buông bỏ cần phải thắng, hoặc chấp nhận thất bại để giữ hòa bình. Đôi khi nhường bước là khôn ngoan nhất. Hãy xin lỗi nếu cần.", "love": "Cãi vã gay gắt, người thắng kẻ thua trong tình yêu. Nếu độc thân, tránh người thích tranh cãi. Nếu đã có đôi, hãy tự hỏi: thắng tranh luận có quan trọng hơn hạnh phúc?", "career": "Cạnh tranh công sở, người thắng kẻ thua. Có thể bạn đang phải đấu tranh bảo vệ ý tưởng. Tài chính cần cẩn thận — đừng lợi dụng người khác.", "spirituality": "Tranh cãi tín ngưỡng, phe phái. Hãy nhớ rằng không ai nắm giữ chân lý tuyệt đối. Hòa bình tinh thần quan trọng hơn chứng minh mình đúng."}, {"id": "swords-6", "name": "Six of Swords", "vietnameseName": "Sáu Kiếm", "number": "6", "arcana": "minor", "suit": "swords", "keywords": "Chuyển tiếp, rời bỏ khó khăn, du lịch, chữa lành, hy vọng", "upright": "Bạn đang rời khỏi vùng nước xấu, tiến về phía bình yên. Dù hành trình còn dài, hướng đã đúng. Hãy để quá khứ lại phía sau và nhìn về tương lai.", "reversed": "Mắc kẹt trong quá khứ, chuyến đi trì hoãn, hoặc mang theo quá nhiều hành lý cảm xúc. Có thể bạn chưa sẵn sàng buông bỏ. Hãy từ từ.", "love": "Tình yêu đang chuyển sang giai đoạn yên bình hơn. Nếu độc thân, hãy rời khỏi mối quan hệ độc hại cũ. Nếu đã có đôi, hãy cùng nhau 'đi' đến nơi mới.", "career": "Chuyển công việc, chuyển văn phòng, hoặc dự án qua giai đoạn khó. Tài chính đang phục hồi. Hãy tính toán chi phí di chuyển cẩn thận.", "spirituality": "Hành trình tâm linh mới — rời bỏ giáo đường cũ, tìm bậc thầy mới, hoặc đơn giản là thay đổi thói quen thiền. Hướng đến bình yên."}, {"id": "swords-7", "name": "Seven of Swords", "vietnameseName": "Bảy Kiếm", "number": "7", "arcana": "minor", "suit": "swords", "keywords": "Chiến lược, lén lút, gian lận, tránh né, thông minh", "upright": "Bạn đang dùng chiến lược thay vì sức mạnh để đạt mục tiêu. Đôi khi cần khéo léo, nhưng hãy cẩn thận với ranh giới giữa thông minh và gian lận.", "reversed": "Bị phát hiện, hối hận, hoặc chiến lược thất bại. Có thể bạn đang lừa dối bản thân hoặc người khác. Hãy đối mặt với sự thật trước khi quá muộn.", "love": "Bí mật trong tình yêu, ngoại tình, hoặc không trung thực. Nếu độc thân, cẩn thận với người có vẻ quá hoàn hảo. Nếu đã có đôi, hãy nói ra sự thật.", "career": "Có thể cần làm việc 'ngầm' để bảo vệ ý tưởng, hoặc cảnh giác đồng nghiệp lấy công trạng. Tài chính cần kiểm tra — có thể có sự thất thoát.", "spirituality": "Tâm linh cần trung thực tuyệt đối với bản thân. Đừng lừa dối mình rằng mình đã giác ngộ. Hãy đối mặt với bóng tối riêng."}, {"id": "swords-8", "name": "Eight of Swords", "vietnameseName": "Tám Kiếm", "number": "8", "arcana": "minor", "suit": "swords", "keywords": "Hạn chế, bế tắc, sợ hãi, tự giam cầm, bất lực", "upright": "Bạn cảm thấy bị mắc kẹt, nhưng thực ra xiềng xích do chính bạn tạo ra. Hãy bình tĩnh phân tích — bạn có nhiều lựa chọn hơn tưởng tượng. Đừng để nỗi sợ che mắt.", "reversed": "Giải thoát, tìm lại quyền năng, hoặc nhận ra sự tự do đã có. Bạn đang mở mắt và thấy rằng cửa mở rồi. Hãy bước ra.", "love": "Tình yêu khiến bạn cảm thấy bị giam cầm. Nếu độc thân, đừng để nỗi sợ độc thân ép bạn vào quan hệ tồi. Nếu đã có đôi, hãy nói về cảm giác bị gò bó.", "career": "Cảm thấy kẹt trong công việc hoặc vị trí hiện tại. Hãy tìm mentor hoặc đào tạo mới. Tài chính có thể hạn chế nhưng không đến mức tuyệt vọng.", "spirituality": "Nỗi sợ tinh thần là ảo ảnh lớn nhất. Hãy thiền về sự tự do nội tại — dù bên ngoài thế nào, tâm bạn có thể tự do."}, {"id": "swords-9", "name": "Nine of Swords", "vietnameseName": "Chín Kiếm", "number": "9", "arcana": "minor", "suit": "swords", "keywords": "Lo âu, ác mộng, cảm thấy tội lỗi, căng thẳng, suy nghĩ tiêu cực", "upright": "Nỗi lo đang ám ảnh bạn — chủ yếu trong đầu. Hãy nhận ra rằng hầu hết điều bạn sợ không xảy ra. Ghi chép suy nghĩ, tìm người nói chuyện, hoặc tìm chuyên gia nếu cần.", "reversed": "Vượt qua lo âu, tìm lại hy vọng, hoặc nhận ra vấn đề nhỏ hơn tưởng tượng. Ánh sáng đang len lỏi vào bóng tối. Hãy tha thứ cho bản thân.", "love": "Lo lắng về tình yêu, ghen tuông, hoặc ác mộng về đối phương. Nếu độc thân, đừng để nỗi sợ bị bỏ rơi kiểm soát. Nếu đã có đôi, hãy chia sẻ nỗi lo.", "career": "Căng thẳng công việc cao, deadline dồn dập. Hãy ưu tiên và từ chối việc không cần thiết. Tài chính lo ngại có thể được giải quyết bằng kế hoạch cụ thể.", "spirituality": "Ác mộng mang thông điệp tâm linh — đừng bỏ qua. Ghi chép giấc mơ, tìm hiểu biểu tượng. Lo âu là dấu hiệu bạn cần thay đổi hướng đi."}, {"id": "swords-10", "name": "Ten of Swords", "vietnameseName": "Mười Kiếm", "number": "10", "arcana": "minor", "suit": "swords", "keywords": "Kết thúc đau đớn, phản bội, thất bại, mất mát, bước sang trang mới", "upright": "Một kết thúc đau đớn đã đến — nhưng đây là điểm thấp nhất, chỉ có thể lên từ đây. Hãy để quá khứ lại và bắt đầu lại. Ánh sáng đang ở phía sau lưng.", "reversed": "Phục hồi sau thất bại, tìm thấy hy vọng từ đống đổ nát. Bạn đã sống sót và mạnh hơn. Hãy vui mừng vì điều tệ nhất đã qua.", "love": "Chia tay đau đớn, phản bội sâu sắc. Nếu độc thân, hãy chữa lành trước khi yêu. Nếu đã có đôi, đây có thể là điểm cực điểm trước khi làm lại từ đầu.", "career": "Thất bại nghiêm trọng, dự án đổ vỡ, hoặc sa thải. Tài chính bị ảnh hưởng nặng. Hãy tìm nguồn hỗ trợ, đừng tự gánh hết.", "spirituality": "Sự tan vỡ hoàn toàn của hệ thống niềm tin cũ. Đau nhưng cần thiết để xây dựng niềm tin mới vững chắc hơn. Hãy để bản thân được chôn cất để tái sinh."}, {"id": "swords-page", "name": "Page of Swords", "vietnameseName": "Hoàng Tử Kiếm", "number": "Page", "arcana": "minor", "suit": "swords", "keywords": "Tò mò, học hỏi, thông tin, cảnh giác, trẻ trung", "upright": "Một ý tưởng mới đầy sự tò mò và ham học hỏi. Tin tức quan trọng sắp đến. Hãy đặt câu hỏi, nghiên cứu, đừng chấp nhận câu trả lời bề mặt.", "reversed": "Nói lắm, thiếu kinh nghiệm, hoặc dùng lời lẽ gây tổn thương. Có thể bạn đang tranh cãi không cần thiết. Hãy kiểm soát lưỡi và lắng nghe nhiều hơn.", "love": "Tình yêu cần giao tiếp trung thực. Nếu độc thân, hãy tìm hiểu kỹ trước khi tin tưởng. Nếu đã có đôi, tránh vặn vẹo lời nhau — nói thẳng nhưng nhẹ nhàng.", "career": "Học việc, đào tạo kỹ năng mới, hoặc nghiên cứu thị trường. Hãy tận dụng sự tò mò. Tài chính cần cẩn thận với hợp đồng — đọc kỹ điều khoản nhỏ.", "spirituality": "Tìm kiếm chân lý tinh thần qua tri thức, sách vở, hoặc thảo luận sâu. Hãy đặt câu hỏi về niềm tin của mình — đó là cách trưởng thành."}, {"id": "swords-knight", "name": "Knight of Swords", "vietnameseName": "Hiệp Sĩ Kiếm", "number": "Knight", "arcana": "minor", "suit": "swords", "keywords": "Hành động nhanh, quyết liệt, tham vọng, thẳng thắn, thiếu kiên nhẫn", "upright": "Thời điểm cần hành động quyết liệt và nhanh chóng. Bạn có khả năng cắt đứt vấn đề phức tạp bằng sự rõ ràng. Hãy tấn công mục tiêu mà không do dự.", "reversed": "Quá hung hăng, thô lỗ, hoặc lao vào mà không nghĩ. Bạn có thể đang gây tổn thương người khác bằng lời lẽ sắc bén. Hãy chậm lại, tính toán hậu quả.", "love": "Tình yêu đến nhanh và mãnh liệt. Nếu độc thân, hãy tận hưởng nhưng đừng vội cam kết. Nếu đã có đôi, tránh cãi vã vì lời nói vội vàng. Nghĩ trước khi nói.", "career": "Công việc đòi hỏi tốc độ và sự quyết đoán — luật sư, báo chí, công nghệ. Tài chính biến động nhanh — có thể lãi lớn hoặc lỗ lớn. Hãy có chiến lược rút lui.", "spirituality": "Tinh thần chiến binh — bảo vệ chân lý và công lý. Nhưng hãy nhớ kiếm sắc cũng cần vỏ bọc. Thiền về sự tĩnh lặng giữa hành động."}, {"id": "swords-queen", "name": "Queen of Swords", "vietnameseName": "Nữ Hoàng Kiếm", "number": "Queen", "arcana": "minor", "suit": "swords", "keywords": "Độc lập, trung thực, sắc bén, trí tuệ, ranh giới rõ ràng", "upright": "Bạn đang sử dụng trí tuệ và sự trung thực để giải quyết vấn đề. Hãy đặt ranh giới rõ ràng và bảo vệ chúng. Sự độc lập của bạn là sức mạnh, không phải yếu điểm.", "reversed": "Lạnh lùng quá mức, cay độc, hoặc đóng cửa trái tim. Có thể bạn đang dùng lý trí để tránh đau khổ. Hãy cho phép mình mềm yếu đôi chút.", "love": "Tình yêu cần sự trung thực tuyệt đối. Nếu độc thân, đừng giả vờ phù hợp với ai đó chỉ để được yêu. Nếu đã có đôi, hãy nói ra sự thật dù khó nghe.", "career": "Thành công qua phân tích, chiến lược, và quyết định khách quan. Phù hợp lãnh đạo, tư vấn, pháp lý. Tài chính sáng suốt — hãy cắt giảm chi tiêu không cần thiết.", "spirituality": "Tìm chân lý tinh thần qua sự rõ ràng và buông bỏ ảo tưởng. Hãy thực hành 'chánh niệm về sự thật' — nhìn mọi thứ đúng như nó là, không hơn không kém."}, {"id": "swords-king", "name": "King of Swords", "vietnameseName": "Vua Kiếm", "number": "King", "arcana": "minor", "suit": "swords", "keywords": "Trí tuệ, công lý, lãnh đạo bằng lý trí, sự thật, quyết đoán", "upright": "Bạn đang dẫn dắt bằng trí tuệ và sự công bằng. Mọi quyết định đều dựa trên sự thật và phân tích. Hãy bảo vệ những gì đúng đắn, dù không được yêu thích.", "reversed": "Độc đoán bằng lý trí, thiếu cảm xúc, hoặc dùng luật lệ để áp đặt. Có thể bạn đang biện minh cho hành vi ích kỷ bằng lập luận 'logic'. Hãy lắng nghe trái tim.", "love": "Tình yêu cần sự cam kết dựa trên giá trị chung. Nếu độc thân, hãy tìm người có cùng tầm nhìn. Nếu đã có đôi, hãy giải quyết vấn đề bằng thảo luận trưởng thành.", "career": "Lãnh đạo qua chiến lược và kỷ luật. Phù hợp pháp lý, quân sự, công nghệ, hoặc quản lý cấp cao. Tài chính ổn định nhờ quyết định sáng suốt.", "spirituality": "Tìm kiếm chân lý tối thượng qua thiền định và phân tích. Hãy buông bỏ định kiến để thấy sự thật tinh thần. Trí tuệ rỗng rang mới là trí tuệ thật."}, {"id": "pentacles-ace", "name": "Ace of Pentacles", "vietnameseName": "Át Tiền", "number": "Ace", "arcana": "minor", "suit": "pentacles", "keywords": "Cơ hội tài chính, thịnh vượng, vật chất mới, tiềm năng thực tế", "upright": "Một cơ hội tài chính hoặc vật chất tuyệt vời đang xuất hiện. Có thể là việc làm mới, quà tặng, hoặc cơ hội đầu tư. Hãy nắm bắt và biến thành của cải thực tế.", "reversed": "Cơ hội vuột mất, thiếu kế hoạch tài chính, hoặc đầu tư hão. Có thể bạn đang bỏ qua cơ hội vì thiếu tự tin. Hãy chuẩn bị kỹ lưỡng hơn.", "love": "Tình yêu có cơ sở vật chất vững chắc. Nếu độc thân, hãy tìm người có trách nhiệm tài chính. Nếu đã có đôi, hãy cùng nhau lập kế hoạch tài chính.", "career": "Cơ hội kinh doanh mới, tăng lương, hoặc dự án có lợi nhuận cao. Hãy đầu tư vào bản thân. Tài chính đang lên — hãy quản lý khôn ngoan.", "spirituality": "Kết nối với thiên nhiên, trồng cây, hoặc chăm sóc cơ thể là hành động tâm linh. Hãy trân trọng vật chất như biểu hiện của phước lành vũ trụ."}, {"id": "pentacles-2", "name": "Two of Pentacles", "vietnameseName": "Hai Tiền", "number": "2", "arcana": "minor", "suit": "pentacles", "keywords": "Cân bằng tài chính, đa nhiệm, linh hoạt, thay đổi, nhịp điệu", "upright": "Bạn đang giữ nhiều quả bóng lăn cùng lúc — công việc, gia đình, tài chính. Hãy linh hoạt và vui vẻ với sự hỗn loạn. Bạn có khả năng cân bằng tốt.", "reversed": "Quá tải, mất cân bằng, hoặc tài chính hỗn loạn. Có thể bạn đang cố làm quá nhiều. Hãy ưu tiên và buông bỏ việc không quan trọng.", "love": "Tình yêu cần sự linh hoạt. Nếu độc thân, bạn đang cân bằng giữa tình yêu và công việc. Nếu đã có đôi, hãy cùng nhau quản lý thời gian khôn ngoan.", "career": "Nhiều dự án cùng lúc, cần khả năng đa nhiệm. Tài chính lên xuống nhưng ổn định nếu quản lý tốt. Hãy có ngân sách rõ ràng.", "spirituality": "Cân bằng giữa thế giới vật chất và tinh thần. Đừng bỏ thiền vì bận kiếm tiền, cũng đừng bỏ kiếm tiền vì mê thiền. Cả hai cần nhau."}, {"id": "pentacles-3", "name": "Three of Pentacles", "vietnameseName": "Ba Tiền", "number": "3", "arcana": "minor", "suit": "pentacles", "keywords": "Làm việc nhóm, kỹ năng, học việc, hợp tác, công nhận", "upright": "Bạn đang làm việc xuất sắc trong nhóm và được công nhận về chuyên môn. Hãy tiếp tục học hỏi từ người giỏi hơn. Sự hợp tác đang mang lại kết quả.", "reversed": "Xung đột nhóm, kỹ năng không được công nhận, hoặc làm việc một mình quá nhiều. Có thể bạn cần chủ động hơn trong việc thể hiện khả năng.", "love": "Tình yêu phát triển qua sự hợp tác. Nếu độc thân, hãy tham gia các khóa học hoặc câu lạc bộ. Nếu đã có đôi, hãy cùng nhau học kỹ năng mới.", "career": "Thăng tiến qua kỹ năng chuyên môn và làm việc nhóm. Có thể được công nhận là chuyên gia. Tài chính tăng từ dự án hợp tác.", "spirituality": "Học tập tâm linh trong cộng đồng — khóa tu, nhóm thiền, hoặc workshop. Kỹ năng tâm linh cũng cần rèn luyện như nghề thợ."}, {"id": "pentacles-4", "name": "Four of Pentacles", "vietnameseName": "Bốn Tiền", "number": "4", "arcana": "minor", "suit": "pentacles", "keywords": "Bảo vệ tài sản, kiểm soát, bảo thủ, ổn định, sợ mất mát", "upright": "Bạn đang bảo vệ những gì đã đạt được. Đây là lúc thận trọng với tài chính, tiết kiệm, và đặt nền móng an toàn. Nhưng đừng để sợ mất mát ngăn bạn tận hưởng.", "reversed": "Bủn xỉn, tham lam, hoặc sợ mất kiểm soát đến mức đánh mất niềm vui. Có thể bạn đang bám víu tiền bạc vì thiếu an toàn nội tâm. Hãy chia sẻ.", "love": "Tình yêu gặp khó vì quá chú trọng vật chất. Nếu độc thân, đừng dùng tiền để gây ấn tượng. Nếu đã có đôi, hãy tin tưởng đối phương với tài chính chung.", "career": "Tài chính ổn định, có khoản tiết kiệm tốt. Nhưng đừng bỏ lỡ cơ hội đầu tư vì quá sợ rủi ro. Hãy cân bằng giữa an toàn và tăng trưởng.", "spirituality": "An toàn tinh thần đến từ bên trong, không phải tài sản bên ngoài. Hãy thực hành buông bỏ — cho đi để nhận lại sự tự do."}, {"id": "pentacles-5", "name": "Five of Pentacles", "vietnameseName": "Năm Tiền", "number": "5", "arcana": "minor", "suit": "pentacles", "keywords": "Khó khăn tài chính, cô đơn, bệnh tật, mất mát, thiếu thốn", "upright": "Bạn đang trải qua giai đoạn khó khăn về vật chất hoặc cảm xúc. Có thể cảm thấy bị bỏ rơi. Hãy tìm kiếm sự giúp đỡ — đó không phải là yếu đuối. Ánh sáng vẫn ở phía trước.", "reversed": "Phục hồi sau khó khăn, tìm thấy nguồn hỗ trợ, hoặc nhận ra mình không đơn độc. Có thể có người sẵn sàng giúp nhưng bạn chưa hỏi. Hãy mở miệng.", "love": "Tình yêu đang bị thử thách bởi khó khăn tài chính hoặc sức khỏe. Nếu độc thân, đừng để hoàn cảnh khó khăn khiến bạn tự ti. Nếu đã có đôi, hãy cùng nhau vượt khó.", "career": "Khó khăn tài chính, mất việc, hoặc công ty gặp vấn đề. Hãy cắt giảm chi tiêu không cần thiết và tìm nguồn thu tạm thời. Mọi thứ sẽ qua.", "spirituality": "Khó khăn tinh thần là bài kiểm tra của đức tin. Hãy tìm cộng đồng tâm linh để được hỗ trợ. Sự khiêm nhường mở ra con đường chữa lành."}, {"id": "pentacles-6", "name": "Six of Pentacles", "vietnameseName": "Sáu Tiền", "number": "6", "arcana": "minor", "suit": "pentacles", "keywords": "Cho và nhận, từ thiện, công bằng, chia sẻ, phước lành", "upright": "Bạn đang ở vị trí có thể cho đi — dù là tiền bạc, thời gian, hoặc kiến thức. Hãy chia sẻ với lòng rộng lượng. Cho đi sẽ mang lại nhiều hơn.", "reversed": "Bị bóc lột, cho đi quá nhiều, hoặc lợi dụng sự hào phóng. Có thể bạn đang giúp người không biết trân trọng. Hãy đặt ranh giới.", "love": "Tình yêu cân bằng giữa cho và nhận. Nếu độc thân, hãy tìm người biết trân trọng. Nếu đã có đôi, hãy chia sẻ gánh nặng công bằng.", "career": "Thưởng, hoa hồng, hoặc được hỗ trợ tài chính. Nếu bạn là cấp trên, hãy đối xử công bằng với nhân viên. Tài chính tốt — hãy cho đi một phần.", "spirituality": "Tâm linh là vòng tròn cho và nhận. Hãy chia sẻ phước lành của mình. Sự hào phóng tinh thần — lời hay, việc tốt — sẽ quay về gấp bội."}, {"id": "pentacles-7", "name": "Seven of Pentacles", "vietnameseName": "Bảy Tiền", "number": "7", "arcana": "minor", "suit": "pentacles", "keywords": "Kiên nhẫn, đánh giá, chờ đợi, đầu tư dài hạn, phản chiếu", "upright": "Bạn đã gieo hạt và đang chờ mùa gặt. Đây là lúc đánh giá tiến độ, kiên nhẫn chờ đợi, và có thể điều chỉnh kế hoạch. Kết quả sẽ đến nếu bạn không bỏ cuộc.", "reversed": "Thiếu kiên nhẫn, đầu tư thất bại, hoặc cảm thấy công sức bị lãng phí. Có thể bạn đang trồng cây sai chỗ. Hãy xem lại chiến lược.", "love": "Tình yêu cần thời gian phát triển. Nếu độc thân, đừng vội. Nếu đã có đôi, hãy cùng nhau đánh giá và điều chỉnh mối quan hệ.", "career": "Dự án dài hạn đang tiến triển. Có thể cần thêm vốn hoặc thời gian. Tài chính ổn định nhưng chưa thu hoạch — hãy kiên nhẫn.", "spirituality": "Tâm linh là vườn cần chăm sóc lâu dài. Hãy kiên nhẫn với bản thân. Không có con đường tắt đến giác ngộ."}, {"id": "pentacles-8", "name": "Eight of Pentacles", "vietnameseName": "Tám Tiền", "number": "8", "arcana": "minor", "suit": "pentacles", "keywords": "Chăm chỉ, học việc, kỹ năng, cần cù, chú tâm", "upright": "Bạn đang miệt mài rèn luyện kỹ năng. Sự chăm chỉ và chú ý đến từng chi tiết sẽ biến bạn thành chuyên gia. Hãy tiếp tục — thành công đến từ công việc chăm chỉ.", "reversed": "Làm việc quá sức, thiếu đam mê, hoặc công việc nhàm chán. Có thể bạn đang rèn kỹ năng không còn phù hợp. Hãy xem lại động lực.", "love": "Tình yêu cần đầu tư thời gian và công sức. Nếu độc thân, hãy tập trung phát triển bản thân trước. Nếu đã có đôi, hãy cùng nhau xây dựng thói quen tốt.", "career": "Thăng tiến qua kỹ năng chuyên môn. Hãy học thêm chứng chỉ hoặc bậc thầy. Tài chính tăng từ sự cần cù và uy tín.", "spirituality": "Thực hành tâm linh đều đặn mỗi ngày — như người thợ rèn. Giác ngộ không đến từ sự kiện đặc biệt mà từ thói quen kiên trì."}, {"id": "pentacles-9", "name": "Nine of Pentacles", "vietnameseName": "Chín Tiền", "number": "9", "arcana": "minor", "suit": "pentacles", "keywords": "Độc lập, thịnh vượng, an nhàn, tự hào, hưởng thụ", "upright": "Bạn đã đạt được sự độc lập tài chính và tinh thần. Hãy tận hưởng thành quả trong yên bình. Bạn xứng đáng với những gì đã đạt được.", "reversed": "Phụ thuộc, làm việc quá sức dù đã có đủ, hoặc cảm thấy trống rỗng dù thành công. Có thể bạn đang định nghĩa sai giá trị bản thân.", "love": "Tình yêu đến từ sự tự tin và độc lập. Nếu độc thân, hãy tận hưởng cuộc sống độc thân phong phú. Nếu đã có đôi, hãy tôn trọng không gian riêng.", "career": "Thành công sự nghiệp, tự do tài chính. Hãy tận hưởng nhưng không ngủ quên. Tài chính dư dả — đã đến lúc hưởng thụ xứng đáng.", "spirituality": "Tâm linh độc lập — bạn không cần người khác xác nhận. Hãy tận hưởng sự kết nối với thiên nhiên. Một mình trong vườn cũng là thiền định."}, {"id": "pentacles-10", "name": "Ten of Pentacles", "vietnameseName": "Mười Tiền", "number": "10", "arcana": "minor", "suit": "pentacles", "keywords": "Gia tộc, di sản, thịnh vượng lâu dài, an ninh, thành công nhiều thế hệ", "upright": "Sự thịnh vượng và an ninh đã đạt đến đỉnh cao. Không chỉ bạn mà cả gia đình đều hưởng lợi. Hãy nghĩ đến di sản bạn để lại cho thế hệ sau.", "reversed": "Mất mát gia đình, tranh chấp tài sản, hoặc thịnh vượng bề ngoài. Có thể bạn đang bỏ qua giá trị thực sự để đuổi theo vật chất. Hãy xem lại ưu tiên.", "love": "Tình yêu vững chắc, được gia đình ủng hộ, hoặc chuẩn bị lập gia đình. Nếu độc thân, hãy tìm người có cùng giá trị gia đình. Nếu đã có đôi, hãy xây dựng tổ ấm lâu dài.", "career": "Doanh nghiệp gia đình, di sản kinh doanh, hoặc đầu tư bất động sản. Tài chính rất tốt — hãy nghĩ đến kế hoạch kế thừa.", "spirituality": "Tâm linh gia truyền, kết nối với tổ tiên. Hãy tôn vinh nguồn cội và truyền lại giá trị tinh thần cho con cháu. Di sản tinh thần quan trọng hơn tiền bạc."}, {"id": "pentacles-page", "name": "Page of Pentacles", "vietnameseName": "Hoàng Tử Tiền", "number": "Page", "arcana": "minor", "suit": "pentacles", "keywords": "Học việc, cơ hội tài chính, thực hành, khởi đầu vững chắc", "upright": "Một cơ hội học tập hoặc tài chính mới đang xuất hiện. Hãy nắm bắt với thái độ nghiêm túc. Đây là lúc đặt nền móng cho sự thịnh vượng tương lai.", "reversed": "Thiếu kỷ luật, lười biếng, hoặc bỏ lỡ cơ hội vì thiếu tập trung. Có thể bạn đang học sai thứ hoặc đầu tư mù quáng. Hãy lập kế hoạch cụ thể.", "love": "Tình yêu cần sự thực tế. Nếu độc thân, hãy tìm người có chung mục tiêu vật chất. Nếu đã có đôi, hãy cùng nhau lập ngân sách và mục tiêu dài hạn.", "career": "Học việc, thực tập, hoặc dự án nhỏ khởi đầu. Hãy chăm chỉ và khiêm tốn. Tài chính có tin tốt nhưng cần tiết kiệm — đừng tiêu ngay.", "spirituality": "Hành trình tâm linh cần thực hành đều đặn, không phải lý thuyết suông. Hãy áp dụng những gì đọc được vào cuộc sống hàng ngày. Thiền giữa việc làm vườn hoặc nấu ăn."}, {"id": "pentacles-knight", "name": "Knight of Pentacles", "vietnameseName": "Hiệp Sĩ Tiền", "number": "Knight", "arcana": "minor", "suit": "pentacles", "keywords": "Chăm chỉ, kiên trì, trách nhiệm, thực tế, chậm mà chắc", "upright": "Bạn đang tiến bước chậm rãi nhưng vững chắc. Sự kiên nhẫn và làm việc chăm chỉ sẽ mang lại thành công bền vững. Đừng so sánh với người tiến nhanh hơn.", "reversed": "Quá chậm chạp, bảo thủ, hoặc mắc kẹt trong vùng an toàn. Có thể bạn đang bỏ lỡ cơ hội vì sợ rủi ro. Hãy mạnh dạn thử nghiệm đôi chút.", "love": "Tình yêu ổn định, thực tế. Nếu độc thân, hãy kiên nhẫn — người phù hợp cần thời gian để xuất hiện. Nếu đã có đôi, hãy cùng nhau xây dựng tổ ấm từng viên gạch.", "career": "Công việc đòi hỏi sự tỉ mỉ và kiên nhẫn — kế toán, kỹ thuật, nông nghiệp. Tài chính tăng chậm nhưng chắc. Hãy đầu tư dài hạn, tránh đầu cơ.", "spirituality": "Tâm linh gắn liền với thực hành đều đặn. Hãy lập thói quen thiền định mỗi ngày, dù chỉ 5 phút. Sự kiên trì tạo ra biến đổi sâu sắc."}, {"id": "pentacles-queen", "name": "Queen of Pentacles", "vietnameseName": "Nữ Hoàng Tiền", "number": "Queen", "arcan
