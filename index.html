// ========== SUIT ICONS ==========
const suitIcons = {
  wands: '🔥', cups: '🏆', swords: '⚔️', pentacles: '💰', major: '⭐'
};
const suitLabels = {
  wands: 'Wands (Gậy)', cups: 'Cups (Cốc)', swords: 'Swords (Kiếm)', pentacles: 'Pentacles (Tiền)', major: 'Major Arcana'
};
const suitDescriptions = {
  major: 'Major Arcana là 22 lá bài quan trọng nhất trong bộ Tarot, kể câu chuyện hành trình của con người từ khi sinh ra đến khi đạt được giác ngộ. Mỗi lá đại diện cho một bài học lớn, một bước ngoặt, hoặc một sự kiện thay đổi cuộc đời. Khi một lá Major Arcana xuất hiện, hãy đặc biệt chú ý — nó mang thông điệp quan trọng.',
  wands: 'Wands (Gậy) đại diện cho nguyên tố Lửa — năng lượng, đam mê, sáng tạo và hành động. Các lá Wands nói về những gì khiến bạn hào hứng bừng lên, những ý tưởng cháy bỏng, và lòng can đảm để theo đuổi ước mơ. Khi một lá Wands xuất hiện, có điều gì đó đang thôi thúc bạn hành động.',
  cups: 'Cups (Cốc) đại diện cho nguyên tố Nước — cảm xúc, tình yêu, trực giác và các mối quan hệ. Các lá Cups nói về trái tim bạn đang cảm thấy, những kết nối sâu sắc với người khác, và thế giới nội tâm phong phú. Khi một lá Cups xuất hiện, hãy lắng nghe cảm xúc của bạn.',
  swords: 'Swords (Kiếm) đại diện cho nguyên tố Gió — tư duy, sự thật, giao tiếp và xung đột. Các lá Swords nói về cách bạn suy nghĩ, quyết định, và đối mặt với khó khăn. Đây là nhóm bài nhiều thử thách nhất, nhưng cũng mang lại sự rõ ràng và trí tuệ. Khi một lá Swords xuất hiện, hãy dùng lý trí và sự thật để dẫn đường.',
  pentacles: 'Pentacles (Tiền) đại diện cho nguyên tố Đất — tiền bạc, công việc, sức khỏe và vật chất. Các lá Pentacles nói về cuộc sống thực tế: thu nhập, sự nghiệp, tài sản, và cách bạn xây dựng nền tảng vững chắc. Khi một lá Pentacles xuất hiện, hãy chú ý đến tài chính và các vấn đề thực tế.'
};

// ========== DOM REFS ==========
const searchInput = document.getElementById('searchInput');
const searchClear = document.getElementById('searchClear');
const filterBtns = document.querySelectorAll('.filter-btn');
const cardContainer = document.getElementById('cardContainer');
const modalOverlay = document.getElementById('modalOverlay');
const modalBody = document.getElementById('modalBody');
const modalClose = document.getElementById('modalClose');
const resultsInfo = document.getElementById('resultsInfo');

// ========== STATE ==========
let currentFilter = 'all';
let searchQuery = '';
let currentOrientation = 'upright'; // 'upright' or 'reversed'

// ========== RENDER ==========
function getCardClass(card) {
  const suitClass = card.suit ? `suit-${card.suit}` : (card.arcana === 'major' ? 'suit-major' : '');
  return `tarot-card ${suitClass}`;
}

function renderCard(card, index) {
  return `
    <div class="${getCardClass(card)}" data-id="${card.id}" data-suit="${card.suit || card.arcana}" style="animation-delay:${Math.min(index * 0.03, 1)}s">
      <div class="card-frame">
        <div class="card-ornament-top"></div>
        <div class="card-number">${card.number}</div>
        <div class="card-suit-icon">${suitIcons[card.suit || 'major']}</div>
        <div class="card-name-en">${card.name}</div>
        <div class="card-name-vn">${card.vietnameseName}</div>
        <div class="card-ornament-bottom"></div>
        <div class="card-keywords">${card.keywords}</div>
      </div>
    </div>
  `;
}

function filterCards() {
  const q = searchQuery.toLowerCase().trim();
  return cards.filter(card => {
    // Filter by category
    if (currentFilter !== 'all') {
      if (card.arcana === 'major' && currentFilter !== 'major') return false;
      if (card.arcana === 'minor' && card.suit !== currentFilter) return false;
    }
    // Filter by search
    if (q) {
      const text = `${card.name} ${card.vietnameseName} ${card.number} ${card.keywords} ${card.upright} ${card.reversed}`.toLowerCase();
      return text.includes(q);
    }
    return true;
  });
}

function renderAll() {
  const filtered = filterCards();

  if (filtered.length === 0) {
    cardContainer.innerHTML = '<div class="no-results">Không tìm thấy lá bài nào. Hãy thử từ khóa khác.<br>No cards found. Try a different keyword.</div>';
    resultsInfo.textContent = '';
    return;
  }

  resultsInfo.textContent = `Hiển thị ${filtered.length} lá bài`;

  // Group by category
  const groups = {};
  filtered.forEach(card => {
    const key = card.arcana === 'major' ? 'major' : card.suit;
    if (!groups[key]) groups[key] = [];
    groups[key].push(card);
  });

  // Show suit description when filtered to a single category
  let html = '';
  const singleFilter = currentFilter !== 'all' && !searchQuery;
  if (singleFilter && suitDescriptions[currentFilter]) {
    html += '<div class="suit-intro">';
    html += `<h2 class="section-title">${suitLabels[currentFilter]}</h2>`;
    html += `<div class="section-count">${filtered.length} lá bài</div>`;
    html += `<p class="suit-desc">${suitDescriptions[currentFilter]}</p>`;
    html += '</div>';
  }

  const order = ['major', 'wands', 'cups', 'swords', 'pentacles'];
  order.forEach(key => {
    if (groups[key]) {
      html += `<div class="section-header" id="section-${key}">`;
      html += `<h2 class="section-title">${suitLabels[key]}</h2>`;
      html += `<div class="section-count">${groups[key].length} lá bài</div>`;
      html += '</div>';
      html += '<div class="card-grid">';
      groups[key].forEach((card, i) => {
        html += renderCard(card, i);
      });
      html += '</div>';
    }
  });

  cardContainer.innerHTML = html;

  // Add click handlers
  document.querySelectorAll('.tarot-card').forEach(el => {
    el.addEventListener('click', () => {
      const card = cards.find(c => c.id === el.dataset.id);
      if (card) openModal(card);
    });
  });
}

// ========== MODAL ==========
function openModal(card) {
  currentOrientation = 'upright';
  modalBody.innerHTML = buildModalHTML(card);
  modalOverlay.classList.add('active');
  document.body.style.overflow = 'hidden';

  // Setup orientation toggle
  const oriBtns = modalBody.querySelectorAll('.ori-btn');
  oriBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      currentOrientation = btn.dataset.ori;
      oriBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      updateModalContent(card);
    });
  });
}

function buildModalHTML(card) {
  const suitLabel = card.suit ? suitLabels[card.suit] : 'Major Arcana (Ẩn Chính)';
  return `
    <div class="modal-num-badge">${card.number}</div>
    <div class="modal-header">
      <div class="modal-number">${suitLabel} — ${card.number}</div>
      <h2 class="modal-name-en">${card.name}</h2>
      <div class="modal-name-vn">${card.vietnameseName}</div>
      <div class="modal-keywords">${card.keywords}</div>
    </div>

    <div class="orientation-toggle">
      <button class="ori-btn active" data-ori="upright">
        <span style="display:inline-block;transform:rotate(0deg)">🃏</span> Xuôi (Upright)
      </button>
      <button class="ori-btn" data-ori="reversed">
        <span style="display:inline-block;transform:rotate(180deg)">🃏</span> Ngược (Reversed)
      </button>
    </div>

    <div id="modalMeanings">
      ${buildMeaningsHTML(card, 'upright')}
    </div>
  `;
}

function updateModalContent(card) {
  const container = document.getElementById('modalMeanings');
  if (container) {
    container.innerHTML = buildMeaningsHTML(card, currentOrientation);
  }
}

function buildMeaningsHTML(card, orientation) {
  const isRev = orientation === 'reversed';
  const mainMeaning = isRev ? card.reversed : card.upright;
  const mainTitle = isRev ? 'Ý Nghĩa Ngược (Reversed)' : 'Ý Nghĩa Xuôi (Upright)';
  const mainClass = isRev ? 'reversed' : '';

  return `
    <div class="meaning-section ${mainClass}">
      <div class="meaning-title">${mainTitle}</div>
      <div class="meaning-text">${mainMeaning}</div>
    </div>

    <div class="meaning-section love">
      <div class="meaning-title">❤️ Tình Yêu (Love)</div>
      <div class="meaning-text">${isRev ? card.love : card.love}</div>
    </div>

    <div class="meaning-section career">
      <div class="meaning-title">💼 Sự Nghiệp & Tài Chính (Career)</div>
      <div class="meaning-text">${isRev ? card.career : card.career}</div>
    </div>

    <div class="meaning-section spirituality">
      <div class="meaning-title">🌙 Tinh Thần (Spirituality)</div>
      <div class="meaning-text">${isRev ? card.spirituality : card.spirituality}</div>
    </div>
  `;
}

function closeModal() {
  modalOverlay.classList.remove('active');
  document.body.style.overflow = '';
}

// ========== EVENTS ==========
searchInput.addEventListener('input', (e) => {
  searchQuery = e.target.value;
  searchClear.classList.toggle('visible', searchQuery.length > 0);
  renderAll();
});

searchClear.addEventListener('click', () => {
  searchInput.value = '';
  searchQuery = '';
  searchClear.classList.remove('visible');
  renderAll();
  searchInput.focus();
});

filterBtns.forEach(btn => {
  btn.addEventListener('click', () => {
    filterBtns.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    renderAll();
  });
});

modalClose.addEventListener('click', closeModal);
modalOverlay.addEventListener('click', (e) => {
  if (e.target === modalOverlay) closeModal();
});
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeModal();
});

// ========== SERVICE WORKER ==========
if ('serviceWorker' in navigator) {
  const swCode = `
    self.addEventListener('install', e => {
      e.waitUntil(self.skipWaiting());
    });
    self.addEventListener('activate', e => {
      e.waitUntil(self.clients.claim());
    });
    self.addEventListener('fetch', e => {
      e.respondWith(caches.match(e.request).then(r => r || fetch(e.request)));
    });
  `;
  const swBlob = new Blob([swCode], { type: 'application/javascript' });
  const swUrl = URL.createObjectURL(swBlob);
  navigator.serviceWorker.register(swUrl).catch(() => {});
}

// ========== INIT ==========
renderAll();
</script>
